let GEMINI_KEY="";

async function callAI(content){
  if(!GEMINI_KEY)throw new Error("API key girilmedi. Ayarlardan API key girin.");
  const _t=ms=>new Promise((_,r)=>setTimeout(()=>r(new Error("Zaman aşımı")),ms));
  const parts=[];
  for(const c of content){
    if(c.type==="text") parts.push({text:c.text});
    else if(c.type==="image") parts.push({inlineData:{mimeType:c.source.media_type,data:c.source.data}});
  }
  const r=await Promise.race([fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts}]})}),_t(60000)]);
  if(!r.ok){
    const err=await r.json().catch(()=>({}));
    if(r.status===429)throw new Error("API limiti doldu. Birkaç dakika bekleyip tekrar deneyin.");
    if(r.status===400)throw new Error("API key geçersiz. Ayarlardan doğru key girin.");
    throw new Error("Bağlantı hatası ("+r.status+")");
  }
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||"";
}
function parseJ(r){
  let s=r.trim().replace(/^```(?:json)?\s*/i,"").replace(/\s*```$/i,"").trim();
  const i=s.indexOf("{");if(i<0)throw new Error("JSON yok");
  s=s.slice(i);
  // Kesik JSON düzeltme — eksik kapanış ekle
  try{return JSON.parse(s);}catch(e){
    // Kesik string'i kapat
    let f=s;
    // Açık string varsa kapat
    const lastQuote=f.lastIndexOf('"');
    const beforeQuote=f.substring(0,lastQuote);
    const openQuotes=(beforeQuote.match(/(?<!\\)"/g)||[]).length;
    if(openQuotes%2!==0)f=f.substring(0,lastQuote)+'"';
    // Son virgülü temizle
    f=f.replace(/,\s*$/,'');
    // Eksik kapanışları ekle
    if(!f.includes(']'))f+='"]';
    if(!f.endsWith('}'))f+='}';
    try{return JSON.parse(f);}catch(e2){
      // Son çare — questions dizisini manuel çıkar
      const matches=[...s.matchAll(/"((?:[^"\\]|\\.)*)"/g)].map(m=>m[1].replace(/\\"/g,'"').replace(/\\\\/g,'\\'));
      if(matches.length>1)return{questions:matches.slice(1)};
      throw e;
    }
  }
}

function FontPick({v,set}){
  const[o,setO]=useState(false);const r=useRef();const s=FONTS.find(f=>f.id===v)||FONTS[0];
  useEffect(()=>{const h=e=>{if(r.current&&!r.current.contains(e.target))setO(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);
  return(<div className="fp" ref={r}>
    <button className="fp-b" onClick={()=>setO(!o)}><span className="fp-i">Aa</span><span className="fp-n">{s.n}</span></button>
    {o&&<div className="fp-d">{FONTS.map(f=><button key={f.id} className={`fp-o${f.id===v?" on":""}`} onClick={()=>{set(f.id);setO(false)}}><span style={{fontFamily:f.f,fontSize:14}}>{f.n}</span>{f.id===v&&<b style={{color:"#1b2a4a"}}>✓</b>}</button>)}</div>}
  </div>);
}

function Canvas({onDone,busy,onAddAsImage}){
  const ref=useRef();const drawing=useRef(false);const startPt=useRef(null);const pathPts=useRef([]);const snapshot=useRef(null);const lastPt=useRef(null);
  const[tool,setTool]=useState("pen");const[sz,setSz]=useState(2.5);const[clr,setClr]=useState("#111");const[dirty,setDirty]=useState(false);
  const[gridOpt,setGridOpt]=useState({grid:true,nums:true});
  const[undoStack,setUndoStack]=useState([]);
  const[cvH,setCvH]=useState(300); // canvas yüksekliği
  const[rightAngle,setRightAngle]=useState(0);
  const[arcShowDeg,setArcShowDeg]=useState(true);
  const[tickStyle,setTickStyle]=useState(0);
  const[txtSize,setTxtSize]=useState(14);
  const[curvePhase,setCurvePhase]=useState(0); // 0=başlangıç, 1=uçlar belirlendi kontrol noktası seç
  const curveEnds=useRef(null); // {x1,y1,x2,y2}
  const curveSnap=useRef(null);
  const[polyPts,setPolyPts]=useState([]);const polySnap=useRef(null);
  const[selRect,setSelRect]=useState(null); // {x,y,w,h} seçim alanı
  const[selData,setSelData]=useState(null); // seçilen pikseller
  const[selDrag,setSelDrag]=useState(false); // sürükleniyor mu
  const selSnap=useRef(null);
  const rightCycle=useRef({x:0,y:0,idx:0}); // aynı noktada döngü
  const[txtMode,setTxtMode]=useState(false);const[txtVal,setTxtVal]=useState("");const[txtPos,setTxtPos]=useState(null);const txtRef=useRef();
  const[labels,setLabels]=useState([]); // [{id,text,x,y,color,size}]
  const[dragLabel,setDragLabel]=useState(null);const dragOff=useRef(null);

  const init=useCallback(()=>{const c=ref.current;if(!c)return;const p=window.devicePixelRatio||2;c.width=c.offsetWidth*p;c.height=c.offsetHeight*p;const x=c.getContext("2d");x.setTransform(p,0,0,p,0,0);x.fillStyle="#fff";x.fillRect(0,0,c.offsetWidth,c.offsetHeight);x.lineCap="round";x.lineJoin="round";setDirty(false);setUndoStack([]);setLabels([]);},[]);
  useEffect(()=>{init();},[init]);
  // Ctrl+Z geri al kısayolu
  useEffect(()=>{
    const handleKey=(e)=>{if((e.ctrlKey||e.metaKey)&&e.key==="z"){e.preventDefault();undo();}};
    window.addEventListener("keydown",handleKey);
    return()=>window.removeEventListener("keydown",handleKey);
  });
  const gp=e=>{const r=ref.current.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return[t.clientX-r.left,t.clientY-r.top];};
  const saveSnap=()=>{const c=ref.current;snapshot.current=c.getContext("2d").getImageData(0,0,c.width,c.height);};
  const restoreSnap=()=>{if(snapshot.current)ref.current.getContext("2d").putImageData(snapshot.current,0,0);};
  const pushUndo=()=>{const c=ref.current;setUndoStack(s=>[...s.slice(-30),c.getContext("2d").getImageData(0,0,c.width,c.height)]);};
  const undo=()=>{if(!undoStack.length)return;const last=undoStack[undoStack.length-1];ref.current.getContext("2d").putImageData(last,0,0);setUndoStack(s=>s.slice(0,-1));};

  // Metin aracı — etiket oluştur (sürüklenebilir)
  const commitText=()=>{
    if(!txtVal.trim()||!txtPos)return;
    setLabels(ls=>[...ls,{id:Date.now(),text:txtVal,x:txtPos[0],y:txtPos[1],color:clr,size:txtSize}]);
    setTxtMode(false);setTxtVal("");setTxtPos(null);setDirty(true);
  };

  // Etiketleri canvas'a çiz (export öncesi)
  const bakeLabels=()=>{
    const ctx=ref.current.getContext("2d");
    labels.forEach(lb=>{
      ctx.fillStyle=lb.color;ctx.font=`bold ${lb.size}px 'DM Sans',sans-serif`;
      ctx.textAlign="left";ctx.textBaseline="middle";
      ctx.fillText(lb.text,lb.x,lb.y);
    });
  };

  // Etiket sürükleme
  const onLabelDown=(e,id)=>{
    e.stopPropagation();
    const rect=ref.current.getBoundingClientRect();
    const lb=labels.find(l=>l.id===id);if(!lb)return;
    const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
    dragOff.current={dx:cx-lb.x,dy:cy-lb.y};
    setDragLabel(id);
  };
  const onLabelMove=(e)=>{
    if(dragLabel===null)return;
    const rect=ref.current.getBoundingClientRect();
    const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
    setLabels(ls=>ls.map(l=>l.id===dragLabel?{...l,x:cx-dragOff.current.dx,y:cy-dragOff.current.dy}:l));
  };
  const onLabelUp=()=>{setDragLabel(null);dragOff.current=null;};
  const deleteLabel=(id)=>{setLabels(ls=>ls.filter(l=>l.id!==id));};

  const dn=e=>{
    e.preventDefault();
    if(tool==="select"){
      const[a,b]=gp(e);const ctx=ref.current.getContext("2d");
      if(selData&&selRect){
        // Seçim var — içine tıkladıysa sürükleme başlat
        if(a>=selRect.x&&a<=selRect.x+selRect.w&&b>=selRect.y&&b<=selRect.y+selRect.h){
          setSelDrag(true);startPt.current=[a,b];drawing.current=true;return;
        }
        // Dışına tıkladı — seçimi sabitle (kesikli kutu olmadan)
        const pr2=window.devicePixelRatio||2;
        const c=ref.current;const ctx2=c.getContext("2d");
        // 1. Temiz arka planı yükle
        ctx2.putImageData(selSnap.current,0,0);
        // 2. Seçili kısmı yeni yerine çiz
        ctx2.save();ctx2.setTransform(1,0,0,1,0,0);
        ctx2.drawImage(selData,Math.round(selRect.x*pr2),Math.round(selRect.y*pr2));
        ctx2.restore();
        // 3. Bu anı yeni snapshot olarak kaydet (kesikli kutu YOK)
        const cleanState=ctx2.getImageData(0,0,c.width,c.height);
        // 4. Tekrar yükle (garanti temiz)
        ctx2.putImageData(cleanState,0,0);
        // 5. Tüm seçim state'lerini temizle
        selSnap.current=null;snapshot.current=null;
        setSelRect(null);setSelData(null);setSelDrag(false);
        setDirty(true);
        return;
      }
      // Yeni seçim başlat
      pushUndo();saveSnap();
      drawing.current=true;startPt.current=[a,b];
      setSelRect(null);setSelData(null);
      return;
    }
    if(tool==="text"){
      if(txtMode){commitText();}
      const[a,b]=gp(e);setTxtPos([a,b]);setTxtMode(true);setTxtVal("");
      setTimeout(()=>txtRef.current?.focus(),50);return;
    }
    if(tool==="tri"||tool==="quad"||tool==="poly"){
      const[a,b]=gp(e);const ctx=ref.current.getContext("2d");
      const maxPts=tool==="tri"?3:tool==="quad"?4:999;
      const newPts=[...polyPts,[a,b]];
      
      if(newPts.length===1){
        // İlk nokta — snapshot al
        pushUndo();polySnap.current=ctx.getImageData(0,0,ref.current.width,ref.current.height);
      }
      
      // Noktaları ve çizgileri çiz (önizleme)
      if(polySnap.current)ctx.putImageData(polySnap.current,0,0);
      ctx.strokeStyle=clr;ctx.lineWidth=sz;ctx.lineCap="round";ctx.lineJoin="round";
      if(newPts.length>1){
        ctx.beginPath();ctx.moveTo(newPts[0][0],newPts[0][1]);
        for(let i=1;i<newPts.length;i++)ctx.lineTo(newPts[i][0],newPts[i][1]);
        if(newPts.length>=maxPts){ctx.closePath();}
        ctx.stroke();
      }
      // Köşe noktaları çiz
      ctx.fillStyle=clr;
      newPts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],3,0,Math.PI*2);ctx.fill();});
      
      if(newPts.length>=maxPts){
        // Şekil tamamlandı — köşe noktalarını sil, temiz çiz
        if(polySnap.current)ctx.putImageData(polySnap.current,0,0);
        ctx.strokeStyle=clr;ctx.lineWidth=sz;ctx.lineCap="round";ctx.lineJoin="round";
        ctx.beginPath();ctx.moveTo(newPts[0][0],newPts[0][1]);
        for(let i=1;i<newPts.length;i++)ctx.lineTo(newPts[i][0],newPts[i][1]);
        ctx.closePath();ctx.stroke();
        setPolyPts([]);polySnap.current=null;setDirty(true);
      }else{
        setPolyPts(newPts);setDirty(true);
      }
      return;
    }
    if(tool==="curve"){
      const[a,b]=gp(e);
      if(curvePhase===0||!curveEnds.current){
        // Aşama 1: başlangıç noktası, sürükleyerek bitiş belirle
        pushUndo();saveSnap();curveSnap.current=snapshot.current;
        drawing.current=true;startPt.current=[a,b];
        setCurvePhase(1);
      }else{
        // Aşama 2: kontrol noktası tıklanarak sabitleniyor
        if(curveSnap.current)ref.current.getContext("2d").putImageData(curveSnap.current,0,0);
        const x=ref.current.getContext("2d");
        const{x1,y1,x2,y2}=curveEnds.current;
        x.strokeStyle=clr;x.lineWidth=sz;x.lineCap="round";
        x.beginPath();x.moveTo(x1,y1);x.quadraticCurveTo(a,b,x2,y2);x.stroke();
        setCurvePhase(0);curveEnds.current=null;curveSnap.current=null;
        setDirty(true);
      }

    {label:"Şekil",tools:[{id:"tri",icon:"△",tip:"Üçgen"},{id:"quad",icon:"◇",tip:"Dörtgen"},{id:"poly",icon:"⬠",tip:"Çokgen"},{id:"rect",icon:"▭",tip:"Dikdörtgen"},{id:"circle",icon:"○",tip:"Daire"}]},
    {label:"İşaret",tools:[{id:"arc",icon:"⌒",tip:"Açı yayı"},{id:"right",icon:"⊾",tip:"Dik açı"},{id:"parallel",icon:"∥",tip:"Paralel"},{id:"tick",icon:"╫",tip:"Eşit kenar"},{id:"dot",icon:"●",tip:"Nokta"},{id:"fill",icon:"🪣",tip:"Boya"}]},

  return(<div className="cv-wrap">

        <div className="cvb-g">{g.tools.map(t=><button key={t.id} className={`ct${tool===t.id?" on":""}`} onClick={()=>{setTool(t.id);if(txtMode)commitText();setPolyPts([]);polySnap.current=null;setCurvePhase(0);curveEnds.current=null;}} title={t.tip}>{t.icon}</button>)}</div>
      </div>)}
      {tool==="arc"&&<label className="cb-chk"><input type="checkbox" checked={arcShowDeg} onChange={e=>setArcShowDeg(e.target.checked)}/>Derece</label>}

/* ═══ S1 — Formül Çevir ═══ */

    const b=du.split(",")[1],m=du.match(/^data:(image\/\w+);/)?.[1]||"image/png";
    const raw=await callAI([{type:"image",source:{type:"base64",media_type:m,data:b}},{type:"text",text:PROMPT_FORMULA}]);

  }catch(e){setErr(e.message==="Failed to fetch"?"Bağlantı kurulamadı. İnternet bağlantınızı kontrol edin.":e.message);}setBusy(false);};

      {res.map((r,i)=><div key={i} className="rc">

          {r.latex&&<button className={`bcp bcp2${cp===`${i}l`?" ok":""}`} onClick={()=>copy(r.latex,`${i}l`)}>{cp===`${i}l`?"✓ Kopyalandı":"📋 LaTeX"}</button>}
          <button className="bcp bcp3" onClick={()=>sendToS2(r.text)}>📤 Soru Tara'ya Ekle</button>

/* ═══ Editable Question Item with Drag + Copy ═══ */

  return(
    <div className={`qr${dragging?" qr-drag":""}`}

      onDrop={e=>{e.preventDefault();onDrop(index);}}>
      <span className="qhandle" title="Sürükle">⠿</span>

      {isImg?<div className="qimg"><img src={html.match(/src="([^"]+)"/)?.[1]} style={{maxWidth:"100%",maxHeight:120}}/></div>:
      <div className="qce" ref={ref} contentEditable suppressContentEditableWarning
        dangerouslySetInnerHTML={{__html:html}} onBlur={handleBlur}/>}

/* ═══ S2 — Soru Tara (AI HTML çıktı) ═══ */
function S2({font,setFont,clipboard,clearClip,setClip}){
  const[qs,setQs]=useState([]);
  const[tpl,setTpl]=useState("yaprak");const[cols,setCols]=useState(2);
  const[cfg,setCfg]=useState({konu:"MATEMATİK",alt:"Konu Testi",no:"01",opt:5,okul:"",baslik:"",sure:"40",unite:"ÜNİTE 1"});
  const[busy,setBusy]=useState(false);const[err,setErr]=useState("");const[show,setShow]=useState(false);const[txt,setTxt]=useState("");
  const[addMode,setAddMode]=useState("text"); // text | shape | graph
  const[shapeDesc,setShapeDesc]=useState("");const[shapeLoading,setShapeLoading]=useState(false);
  const[cleaning,setCleaning]=useState(false);
  const[loaded,setLoaded]=useState(false);

  // Açılışta kayıtlı çalışmayı yükle
  useEffect(()=>{
    (async()=>{
      try{
        const r=await window.storage?.get("mathstudio-s2");
        if(r&&r.value){
          const d=JSON.parse(r.value);
          // Sadece string olan soruları yükle (object olanları filtrele)
          if(d.qs?.length){setQs(d.qs.filter(q=>typeof q==='string'));setShow(true);}
          if(d.tpl)setTpl(d.tpl);
          if(d.cols)setCols(d.cols);
          if(d.cfg)setCfg(c=>({...c,...d.cfg}));
        }
      }catch(e){}
      setLoaded(true);
    })();
  },[]);

  // Sorular değişince otomatik kaydet
  useEffect(()=>{
    if(!loaded)return;
    (async()=>{
      try{await window.storage?.set("mathstudio-s2",JSON.stringify({qs,tpl,cols,cfg}));}catch(e){}
    })();
  },[qs,tpl,cols,cfg,loaded]);
  const[graphFns,setGraphFns]=useState([{fn:"x*x-4*x+3",color:"#2563eb",label:"f(x)"}]);
  const[graphXmin,setGraphXmin]=useState(-2);const[graphXmax,setGraphXmax]=useState(6);
  const[graphYmin,setGraphYmin]=useState("auto");const[graphYmax,setGraphYmax]=useState("auto");
  const[graphGrid,setGraphGrid]=useState(true);const[graphRoots,setGraphRoots]=useState(true);const[graphNums,setGraphNums]=useState(true);
  const[graphSize,setGraphSize]=useState(320);

  const addGraphFn=()=>{
    const colors=["#2563eb","#c00","#16a34a","#9333ea","#d97706"];
    const labels=["f(x)","g(x)","h(x)","p(x)","q(x)"];
    const idx=graphFns.length;
    setGraphFns(f=>[...f,{fn:"",color:colors[idx%5],label:labels[idx%5]}]);
  };
  const updateGraphFn=(i,key,val)=>setGraphFns(f=>f.map((g,j)=>j===i?{...g,[key]:val}:g));
  const removeGraphFn=(i)=>setGraphFns(f=>f.filter((_,j)=>j!==i));

  const generateGraph=()=>{
    try{
      const xmin=Number(graphXmin),xmax=Number(graphXmax);
      const W=graphSize,H=Math.round(graphSize*0.75),pad=35;
      const pw=W-2*pad,ph=H-2*pad;
      
      // Tüm fonksiyonların noktalarını hesapla
      let globalYmin=Infinity,globalYmax=-Infinity;
      const allCurves=graphFns.filter(g=>g.fn.trim()).map(g=>{
        const fn2=g.fn.replace(/\^/g,'**');
        const pts=[];
        for(let i=0;i<=200;i++){
          const x=xmin+(xmax-xmin)*i/200;
          try{const y=Function('x','return '+fn2)(x);if(isFinite(y)&&Math.abs(y)<1e6){pts.push({x,y});globalYmin=Math.min(globalYmin,y);globalYmax=Math.max(globalYmax,y);}}catch(e){}
        }
        return{...g,pts,fn2};
      });
      if(!allCurves.length)return;
      
      // Y aralığı
      const ym=globalYmax-globalYmin||1;
      let ymin=graphYmin==="auto"?globalYmin-ym*0.1:Number(graphYmin);
      let ymax=graphYmax==="auto"?globalYmax+ym*0.1:Number(graphYmax);
      if(ymin>=ymax){ymin=globalYmin-1;ymax=globalYmax+1;}
      
      const sx=x=>(pad+(x-xmin)/(xmax-xmin)*pw);
      const sy=y=>(pad+(ymax-y)/(ymax-ymin)*ph);
      
      let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:#fff">`;
      
      // Izgara
      if(graphGrid){
        for(let i=Math.ceil(xmin);i<=Math.floor(xmax);i++){const px=sx(i);svg+=`<line x1="${px}" y1="${pad}" x2="${px}" y2="${H-pad}" stroke="#f0f0f0" stroke-width="0.5"/>`;}
        for(let i=Math.ceil(ymin);i<=Math.floor(ymax);i++){const py=sy(i);svg+=`<line x1="${pad}" y1="${py}" x2="${W-pad}" y2="${py}" stroke="#f0f0f0" stroke-width="0.5"/>`;}
      }
      
      // Eksenler
      const ox=sx(0),oy=sy(0);
      if(ox>=pad&&ox<=W-pad)svg+=`<line x1="${ox}" y1="${pad-5}" x2="${ox}" y2="${H-pad+5}" stroke="#555" stroke-width="1.2"/>`;
      if(oy>=pad&&oy<=H-pad)svg+=`<line x1="${pad-5}" y1="${oy}" x2="${W-pad+5}" y2="${oy}" stroke="#555" stroke-width="1.2"/>`;
      // Ok uçları
      if(ox>=pad&&ox<=W-pad)svg+=`<polygon points="${ox},${pad-5} ${ox-3},${pad+2} ${ox+3},${pad+2}" fill="#555"/>`;
      if(oy>=pad&&oy<=H-pad)svg+=`<polygon points="${W-pad+5},${oy} ${W-pad-2},${oy-3} ${W-pad-2},${oy+3}" fill="#555"/>`;
      svg+=`<text x="${W-pad+8}" y="${(oy||H-pad)+4}" font-size="12" fill="#555" font-weight="600">x</text>`;
      svg+=`<text x="${(ox||pad)+6}" y="${pad-8}" font-size="12" fill="#555" font-weight="600">y</text>`;
      
      // Sayı işaretleri
      if(graphNums){
        for(let i=Math.ceil(xmin);i<=Math.floor(xmax);i++){
          if(i===0)continue;const px=sx(i);
          svg+=`<line x1="${px}" y1="${(oy||H-pad)-3}" x2="${px}" y2="${(oy||H-pad)+3}" stroke="#555" stroke-width="0.8"/>`;
          svg+=`<text x="${px}" y="${(oy||H-pad)+14}" font-size="9" fill="#888" text-anchor="middle">${i}</text>`;
        }
        for(let i=Math.ceil(ymin);i<=Math.floor(ymax);i++){
          if(i===0)continue;const py=sy(i);
          svg+=`<line x1="${(ox||pad)-3}" y1="${py}" x2="${(ox||pad)+3}" y2="${py}" stroke="#555" stroke-width="0.8"/>`;
          svg+=`<text x="${(ox||pad)-8}" y="${py+3}" font-size="9" fill="#888" text-anchor="end">${i}</text>`;
        }
        if(ox>=pad&&ox<=W-pad&&oy>=pad&&oy<=H-pad)svg+=`<text x="${ox-8}" y="${oy+14}" font-size="9" fill="#888">0</text>`;
      }
      
      // Eğriler
      allCurves.forEach(curve=>{
        const pathPts=curve.pts.map(p=>`${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`);
        svg+=`<polyline points="${pathPts.join(' ')}" fill="none" stroke="${curve.color}" stroke-width="2.2" stroke-linecap="round"/>`;
        
        // Kökler (y≈0 olan noktalar)
        if(graphRoots){
          for(let i=1;i<curve.pts.length;i++){
            const p1=curve.pts[i-1],p2=curve.pts[i];
            if(p1.y*p2.y<=0&&Math.abs(p1.y-p2.y)>0.001){
              const t=-p1.y/(p2.y-p1.y);const rx=p1.x+t*(p2.x-p1.x);
              svg+=`<circle cx="${sx(rx).toFixed(1)}" cy="${sy(0).toFixed(1)}" r="4" fill="${curve.color}" stroke="#fff" stroke-width="1.5"/>`;
              svg+=`<text x="${sx(rx).toFixed(1)}" y="${sy(0)-8}" font-size="8" fill="${curve.color}" text-anchor="middle">${rx.toFixed(1)}</text>`;
            }

      });
      
      svg+=`</svg>`;
      saveHistory();
      setQs(p=>[...p,`<div class="qsvg">${svg}</div>`]);
      setShow(true);
    }catch(e){setErr("Fonksiyon hatası: "+e.message);}

        <div className="ql">

    </>}
  </div>);

/* ═══ Image cleaner - adaptive background removal ═══ */
function cleanImage(file){
  return new Promise(async(resolve)=>{
    try{
      const bitmap=await createImageBitmap(file);
      const cv=document.createElement("canvas");
      cv.width=bitmap.width;cv.height=bitmap.height;
      const ctx=cv.getContext("2d",{willReadFrequently:true});
      ctx.drawImage(bitmap,0,0);
      const imgData=ctx.getImageData(0,0,cv.width,cv.height);
      const d=imgData.data;
      const total=d.length/4;
      
      // Step 1: Find the background color (most common light color)
      // Sample corners and edges to detect paper color
      const w=cv.width,h=cv.height;
      let bgR=0,bgG=0,bgB=0,bgCount=0;
      const sample=(x,y)=>{
        const i=(y*w+x)*4;
        const g=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
        if(g>120){bgR+=d[i];bgG+=d[i+1];bgB+=d[i+2];bgCount++;}
      };
      // Sample edges
      for(let x=0;x<w;x+=3){sample(x,0);sample(x,h-1);sample(x,Math.floor(h/2));}
      for(let y=0;y<h;y+=3){sample(0,y);sample(w-1,y);}
      
      if(bgCount>0){bgR=bgR/bgCount;bgG=bgG/bgCount;bgB=bgB/bgCount;}
      else{bgR=230;bgG=230;bgB=230;}
      
      const bgGray=bgR*0.299+bgG*0.587+bgB*0.114;
      // Threshold = midpoint between background and pure black
      const thresh=bgGray*0.65;
      
      // Step 2: Arka plan şeffaf, yazı siyah
      for(let i=0;i<d.length;i+=4){
        const r=d[i],g=d[i+1],b=d[i+2];
        const gray=r*0.299+g*0.587+b*0.114;
        const diffR=Math.abs(r-bgR),diffG=Math.abs(g-bgG),diffB=Math.abs(b-bgB);
        const bgDist=Math.sqrt(diffR*diffR+diffG*diffG+diffB*diffB);
        if(bgDist<80){d[i]=0;d[i+1]=0;d[i+2]=0;d[i+3]=0;}
        else if(gray>thresh){const fade=Math.min(1,(gray-thresh)/(bgGray-thresh));d[i]=0;d[i+1]=0;d[i+2]=0;d[i+3]=Math.round(255*(1-fade));}
        else{d[i+3]=Math.round(Math.min(255,(1-gray/255)*400));d[i]=Math.round(r*0.2);d[i+1]=Math.round(g*0.2);d[i+2]=Math.round(b*0.2);}
      }
      
      // Step 3: Clean edges - very generous border cleaning
      const edgeX=Math.max(30,Math.round(w*0.07));
      const edgeY=Math.max(25,Math.round(h*0.05));
      for(let y=0;y<h;y++){
        for(let x=0;x<w;x++){
          if(x<edgeX||x>=w-edgeX||y<edgeY||y>=h-edgeY){
            const i=(y*w+x)*4;
            d[i]=0;d[i+1]=0;d[i+2]=0;d[i+3]=0;
          }
        }
      }
      
      // Step 3.5: Corner cleaning - wipe ALL corners aggressively
      const cr=Math.max(120,Math.round(Math.min(w,h)*0.25));
      for(let y=0;y<h;y++){
        for(let x=0;x<w;x++){
          const inCorner=(
            (x<cr&&y<cr)||(x>=w-cr&&y<cr)||
            (x<cr&&y>=h-cr)||(x>=w-cr&&y>=h-cr)
          );
          if(inCorner){
            const i=(y*w+x)*4;
            d[i]=0;d[i+1]=0;d[i+2]=0;d[i+3]=0;
          }
        }
      }
      
      // Step 4: Flood fill from edges - any dark pixel touching the border gets removed
      const isWhite=(i)=>d[i]===255&&d[i+1]===255&&d[i+2]===255;
      const makeWhite=(i)=>{d[i]=0;d[i+1]=0;d[i+2]=0;d[i+3]=0;};
      const gray=(i)=>d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
      
      // Scan left edge inward - remove dark strips
      for(let y=0;y<h;y++){
        for(let x=0;x<Math.min(w*0.15,80);x++){
          const i=(y*w+x)*4;
          if(gray(i)>bgGray*0.5) break; // hit actual content, stop
          makeWhite(i);
        }
      }
      // Scan right edge inward
      for(let y=0;y<h;y++){
        for(let x=w-1;x>Math.max(w*0.85,w-80);x--){
          const i=(y*w+x)*4;
          if(gray(i)>bgGray*0.5) break;
          makeWhite(i);
        }
      }
      // Scan top edge inward
      for(let x=0;x<w;x++){
        for(let y=0;y<Math.min(h*0.1,50);y++){
          const i=(y*w+x)*4;
          if(gray(i)>bgGray*0.5) break;
          makeWhite(i);
        }
      }
      // Scan bottom edge inward
      for(let x=0;x<w;x++){
        for(let y=h-1;y>Math.max(h*0.9,h-50);y--){
          const i=(y*w+x)*4;
          if(gray(i)>bgGray*0.5) break;
          makeWhite(i);
        }
      }
      
      ctx.putImageData(imgData,0,0);
      resolve(cv.toDataURL("image/png"));
    }catch(e){
      const r=new FileReader();
      r.onload=()=>resolve(r.result);
      r.readAsDataURL(file);
    }
  });
}

/* ═══ Floating Editor Toolbar — metin seçip boyut/stil değiştirme ═══ */
function EditorToolbar({pvRef}){
  const applySize=(size)=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount)return;
    const range=sel.getRangeAt(0);
    const span=document.createElement("span");
    span.style.fontSize=size;
    try{range.surroundContents(span);}catch(e){
      try{const frag=range.extractContents();span.appendChild(frag);range.insertNode(span);}catch(e2){}
    }
    sel.removeAllRanges();
  };
  const applyStyle=(prop,val)=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount)return;
    const range=sel.getRangeAt(0);
    const span=document.createElement("span");
    span.style[prop]=val;
    try{range.surroundContents(span);}catch(e){
      try{const frag=range.extractContents();span.appendChild(frag);range.insertNode(span);}catch(e2){}
    }
    sel.removeAllRanges();
  };
  const wrapBox=(className)=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount)return;
    const range=sel.getRangeAt(0);
    const div=document.createElement("div");
    div.className=className;
    try{range.surroundContents(div);}catch(e){
      try{const frag=range.extractContents();div.appendChild(frag);range.insertNode(div);}catch(e2){}
    }
    sel.removeAllRanges();
  };
  const insertBox=(className,placeholder)=>{
    const sel=window.getSelection();
    if(!sel||!sel.rangeCount)return;
    const range=sel.getRangeAt(0);
    const div=document.createElement("div");
    div.className=className;
    div.innerHTML=placeholder;
    div.contentEditable="true";
    range.collapse(false);
    range.insertNode(div);
    sel.removeAllRanges();
  };
  // Kutu/vurgu kaldır — seçili metnin etrafındaki kutuyu siler, içerik kalır
  const removeFormat=()=>{
    const sel=window.getSelection();
    if(!sel||!sel.rangeCount)return;
    const node=sel.anchorNode?.parentElement;
    if(!node)return;
    // En yakın ebox veya span bul
    const box=node.closest('.ebox')||node.closest('span[style]');
    if(box){
      const parent=box.parentNode;
      while(box.firstChild)parent.insertBefore(box.firstChild,box);
      parent.removeChild(box);
    }
  };
  const prevent=(e)=>e.preventDefault();
  return(
    <div className="etb" onMouseDown={prevent}>
      <button className="etb-b etb-ud" onMouseDown={prevent} onClick={()=>{document.execCommand('undo');}} title="Geri al">↩</button>
      <button className="etb-b etb-ud" onMouseDown={prevent} onClick={()=>{document.execCommand('redo');}} title="İleri al">↪</button>
      <button className="etb-b etb-ud" onMouseDown={prevent} onClick={removeFormat} title="Kutu/vurgu kaldır">✂️</button>
      <div className="etb-sep"/>
      <span className="etb-l">Metin:</span>
      {[8,9,10,11,12,14].map(s=><button key={s} className={`etb-b${s===11?" etb-on":""}`} onMouseDown={prevent} onClick={()=>applySize(s+'pt')}>{s}</button>)}
      <div className="etb-sep"/>
      <button className="etb-b etb-f" onMouseDown={prevent} onClick={()=>applyStyle('fontWeight','bold')} title="Kalın"><b>B</b></button>
      <button className="etb-b etb-f" onMouseDown={prevent} onClick={()=>applyStyle('fontStyle','italic')} title="İtalik"><i>I</i></button>
      <button className="etb-b etb-f" onMouseDown={prevent} onClick={()=>applyStyle('textDecoration','underline')} title="Altı çizili"><u>U</u></button>
      <div className="etb-sep"/>
      <button className="etb-b etb-c" onMouseDown={prevent} onClick={()=>applyStyle('color','#c00')} title="Kırmızı">🔴</button>
      <button className="etb-b etb-c" onMouseDown={prevent} onClick={()=>applyStyle('color','#2563eb')} title="Mavi">🔵</button>
      <button className="etb-b etb-c" onMouseDown={prevent} onClick={()=>applyStyle('color','#1a1a1a')} title="Siyah">⚫</button>
      <div className="etb-sep"/>
      <span className="etb-l">Vurgu:</span>
      <button className="etb-b etb-h" onMouseDown={prevent} onClick={()=>applyStyle('backgroundColor','#fef3c7')} title="Sarı vurgu" style={{background:'#fef3c7'}}>H</button>
      <button className="etb-b etb-h" onMouseDown={prevent} onClick={()=>applyStyle('backgroundColor','#dbeafe')} title="Mavi vurgu" style={{background:'#dbeafe'}}>H</button>
      <button className="etb-b etb-h" onMouseDown={prevent} onClick={()=>applyStyle('backgroundColor','#dcfce7')} title="Yeşil vurgu" style={{background:'#dcfce7'}}>H</button>
      <button className="etb-b etb-h" onMouseDown={prevent} onClick={()=>applyStyle('backgroundColor','#fde0e0')} title="Kırmızı vurgu" style={{background:'#fde0e0'}}>H</button>
      <div className="etb-sep"/>
      <span className="etb-l">Kutu:</span>
      <button className="etb-b etb-bx" onMouseDown={prevent} onClick={()=>wrapBox('ebox ebox-blue')} title="Mavi kutu">📘</button>
      <button className="etb-b etb-bx" onMouseDown={prevent} onClick={()=>wrapBox('ebox ebox-green')} title="Yeşil kutu">📗</button>
      <button className="etb-b etb-bx" onMouseDown={prevent} onClick={()=>wrapBox('ebox ebox-orange')} title="Turuncu kutu">📙</button>
      <button className="etb-b etb-bx" onMouseDown={prevent} onClick={()=>wrapBox('ebox ebox-red')} title="Kırmızı kutu">📕</button>
      <div className="etb-sep"/>
      <span className="etb-l">Ekle:</span>
      <button className="etb-b etb-ins" onMouseDown={prevent} onClick={()=>insertBox('ebox ebox-def','<b>TANIM:</b> Tanım metnini buraya yazın...')} title="Tanım kutusu">📝Tanım</button>
      <button className="etb-b etb-ins" onMouseDown={prevent} onClick={()=>insertBox('ebox ebox-thm','<b>TEOREM:</b> Teorem metnini buraya yazın...')} title="Teorem kutusu">📐Teorem</button>
      <button className="etb-b etb-ins" onMouseDown={prevent} onClick={()=>insertBox('ebox ebox-warn','<b>DİKKAT:</b> Önemli notu buraya yazın...')} title="Dikkat kutusu">⚠️Dikkat</button>
      <button className="etb-b etb-ins" onMouseDown={prevent} onClick={()=>insertBox('ebox ebox-tip','<b>İPUCU:</b> İpucu metnini buraya yazın...')} title="İpucu kutusu">💡İpucu</button>
      <div className="etb-sep"/>
      <span className="etb-l">Kitap:</span>
      <button className="etb-b etb-ins etb-bk" onMouseDown={prevent} onClick={()=>wrapBox('bk-box bk-def')} title="Seçili metni tanım kutusuna al">📘Tanım</button>
      <button className="etb-b etb-ins etb-bk" onMouseDown={prevent} onClick={()=>wrapBox('bk-box bk-thm')} title="Seçili metni teorem kutusuna al">📐Teorem</button>
      <button className="etb-b etb-ins etb-bk" onMouseDown={prevent} onClick={()=>wrapBox('bk-box bk-prop')} title="Seçili metni özellik kutusuna al">📗Özellik</button>
      <button className="etb-b etb-ins etb-bk" onMouseDown={prevent} onClick={()=>wrapBox('bk-box bk-warn')} title="Seçili metni dikkat kutusuna al">⚠️Dikkat</button>
      <button className="etb-b etb-ins etb-bk" onMouseDown={prevent} onClick={()=>wrapBox('bk-box bk-tip')} title="Seçili metni ipucu kutusuna al">💡İpucu</button>
      <button className="etb-b etb-ins etb-bk" onMouseDown={prevent} onClick={()=>wrapBox('bk-example')} title="Seçili metni örnek kutusuna al">✏️Örnek</button>
      <button className="etb-b etb-ins etb-bk" onMouseDown={prevent} onClick={()=>wrapBox('bk-solve')} title="Seçili metni çözüm kutusuna al">✅Çözüm</button>
    </div>
  );
}

              onBlur={e=>{if(onUpdateQ)onUpdateQ(idx,e.currentTarget.innerHTML);}}/>
          }
          <div className="QOA" contentEditable suppressContentEditableWarning data-ph="Seçenek eklemek için tıklayın: A) ... B) ... (yan yana veya alt alta)"/>
          {tpl==="sinav"&&<div className="QLS"><div className="QL"/><div className="QL"/></div>}
          {onUpdateSpacing&&<div className="QSP">
            <button className="QSPb" onMouseDown={e=>e.preventDefault()} onClick={()=>onUpdateSpacing(idx,Math.max(0,(spacings&&spacings[idx]!==undefined?spacings[idx]:26)-10))}>−</button>
            <span className="QSPt">{spacings&&spacings[idx]!==undefined?spacings[idx]:26}px</span>
            <button className="QSPb" onMouseDown={e=>e.preventDefault()} onClick={()=>onUpdateSpacing(idx,Math.min(200,(spacings&&spacings[idx]!==undefined?spacings[idx]:26)+10))}>+</button>
          </div>}
        </div>
      </div>})}</div>);
        return items;
      })}
    </div>
    {tpl==="yaprak"&&cfg.showCevap!==false&&<div className="CV"><div className="CVT">CEVAP ANAHTARI</div><div className="CVG">{qs.map((_,i)=><div key={i} className="CVR"><b className="CVN">{(startNum||1)+i}</b>{["A","B","C","D","E"].slice(0,cfg.opt||5).map(l=><span key={l} className="CVC">{l}</span>)}</div>)}</div></div>}
    {tpl==="sinav"&&<div className="SF">Başarılar. <b>Puan: ..../100</b></div>}
    {totalPages>1&&<div className="PF">Sayfa {pageNum} / {totalPages}</div>}
  </div>);
}

/* ═══ MAIN ═══ */
function App(){
  const[font,setFont]=useState("stix");
  const[tpl,setTpl]=useState("yaprak");const[cols,setCols]=useState(2);
  const[cfg,setCfg]=useState({konu:"MATEMATİK",alt:"Konu Testi",no:"01",opt:5,okul:"",baslik:"",sure:"40",unite:"ÜNİTE 1",sayfaNo:"",numStyle:"circle",showInfo:true,showCevap:true,divText:""});
  const uc=(k,v)=>setCfg(c=>({...c,[k]:v}));
  const[qs,setQs]=useState([]);const[show,setShow]=useState(false);
  const[busy,setBusy]=useState(false);const[err,setErr]=useState("");
  const[cleaning,setCleaning]=useState(false);
  const[qSize,setQSize]=useState(11);const[perPage,setPerPage]=useState(10);
  const[spacings,setSpacings]=useState({});const[imgSizes,setImgSizes]=useState({});const[imgOffsets,setImgOffsets]=useState({});
  const[history,setHistory]=useState([]);
  const[converting,setConverting]=useState(null);
  const[txt,setTxt]=useState("");
  const[openSec,setOpenSec]=useState(1);
  const[drawMode,setDrawMode]=useState(false);
  const[uploadMode,setUploadMode]=useState(false);
  const[uploadSub,setUploadSub]=useState("draw");
  const[apiKey,setApiKey]=useState("");
  const[showKeyInput,setShowKeyInput]=useState(false);
  // Sayfa açılınca kaydedilmiş key'i yükle
  useEffect(()=>{
    try{const k=localStorage.getItem("ms_gemini_key");if(k){setApiKey(k);GEMINI_KEY=k;}}catch(e){}
  },[]);
  const saveApiKey=(k)=>{
    const key=k.trim();setApiKey(key);GEMINI_KEY=key;
    try{localStorage.setItem("ms_gemini_key",key);}catch(e){}
    setShowKeyInput(false);setErr("");
  };
  const camRef=useRef();const fileRef=useRef();
  const videoRef=useRef();const camStream=useRef(null);
  const[camOn,setCamOn]=useState(false);const[camAct,setCamAct]=useState("text");
  const pvRef=useRef();
  const ff=(FONTS.find(f=>f.id===font)||FONTS[0]).f;

  const openCam=async(act)=>{setCamAct(act);setErr("");
    try{if(camStream.current)camStream.current.getTracks().forEach(t=>t.stop());
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1920},height:{ideal:1080}},audio:false});
      camStream.current=s;setCamOn(true);
      setTimeout(()=>{if(videoRef.current){videoRef.current.srcObject=s;videoRef.current.play().catch(()=>{});}},80);
    }catch(e){setErr("Kamera açılamadı. Dosyalardan resim seçebilirsiniz.");setCamOn(false);}
  };
  const closeCam=()=>{if(camStream.current){camStream.current.getTracks().forEach(t=>t.stop());camStream.current=null;}setCamOn(false);};
  const snapAndProcess=async()=>{
    if(!videoRef.current)return;
    const v=videoRef.current,cv2=document.createElement("canvas");
    cv2.width=v.videoWidth||1280;cv2.height=v.videoHeight||960;
    cv2.getContext("2d").drawImage(v,0,0);
    const du=cv2.toDataURL("image/jpeg",0.92);closeCam();
    if(camAct==="text"||camAct==="book"){
      setBusy(true);setErr("");
      try{const b=du.split(",")[1],pr=camAct==="book"?PROMPT_BOOK:PROMPT_SCAN;
        const raw=await callAI([{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b}},{type:"text",text:pr}]);
        const j=parseJ(raw);if(j.questions?.length){saveHistory();setQs(p=>[...p,...j.questions]);setShow(true);}
      }catch(ex){setErr(ex.message);}setBusy(false);
    }else{setCleaning(true);
      try{const blob=await(await fetch(du)).blob();const file=new File([blob],"cam.jpg",{type:"image/jpeg"});
        const cleaned=await cleanImage(file);saveHistory();setQs(p=>[...p,'<img src="'+cleaned+'" style="max-width:100%;height:auto"/>']);setShow(true);
      }catch(e){saveHistory();setQs(p=>[...p,'<img src="'+du+'" style="max-width:100%;height:auto"/>']);setShow(true);}
      setCleaning(false);}
  };
  useEffect(()=>()=>{if(camStream.current)camStream.current.getTracks().forEach(t=>t.stop());},[]);

  const saveHistory=()=>setHistory(p=>[...p.slice(-20),JSON.stringify(qs)]);
  const undo=()=>{if(!history.length)return;const prev=JSON.parse(history[history.length-1]);setQs(prev);setHistory(p=>p.slice(0,-1));if(prev.length)setShow(true);};
  const delQ=(i)=>{saveHistory();const n=[...qs];n.splice(i,1);setQs(n);if(!n.length)setShow(false);};
  const copyQ=(i)=>{saveHistory();const n=[...qs];n.splice(i+1,0,qs[i]);setQs(n);};
  const[dragIdx,setDragIdx]=useState(null);const[overIdx,setOverIdx]=useState(null);
  const handleDrop=(toIdx)=>{if(dragIdx===null||dragIdx===toIdx)return;saveHistory();const n=[...qs];const item=n.splice(dragIdx,1)[0];n.splice(toIdx,0,item);setQs(n);setDragIdx(null);setOverIdx(null);};

  const scan=async(e)=>{const files=Array.from(e.target.files).filter(f=>f.type.startsWith("image/"));e.target.value="";if(!files.length)return;setBusy(true);setErr("");
    try{for(const file of files){const du=await new Promise(ok=>{const r=new FileReader();r.onload=()=>ok(r.result);r.readAsDataURL(file)});
      const b=du.split(",")[1],m=du.match(/^data:(image\/\w+);/)?.[1]||"image/jpeg";
      const raw=await callAI([{type:"image",source:{type:"base64",media_type:m,data:b}},{type:"text",text:PROMPT_SCAN}]);
      const j=parseJ(raw);if(j.questions?.length){saveHistory();setQs(p=>[...p,...j.questions]);setShow(true);}
    }}catch(ex){setErr(ex.message==="Failed to fetch"?"Bağlantı kurulamadı.":ex.message);}setBusy(false);};
  const scanBook=async(e)=>{const files=Array.from(e.target.files).filter(f=>f.type.startsWith("image/"));e.target.value="";if(!files.length)return;setBusy(true);setErr("");
    try{for(const file of files){const du=await new Promise(ok=>{const r=new FileReader();r.onload=()=>ok(r.result);r.readAsDataURL(file)});
      const b=du.split(",")[1],m=du.match(/^data:(image\/\w+);/)?.[1]||"image/jpeg";
      const raw=await callAI([{type:"image",source:{type:"base64",media_type:m,data:b}},{type:"text",text:PROMPT_BOOK}]);
      const j=parseJ(raw);if(j.questions?.length){saveHistory();setQs(p=>[...p,...j.questions]);setShow(true);}
    }}catch(ex){setErr(ex.message==="Failed to fetch"?"Bağlantı kurulamadı.":ex.message);}setBusy(false);};
  const scanImg=async(e)=>{const files=Array.from(e.target.files).filter(f=>f.type.startsWith("image/"));e.target.value="";if(!files.length)return;setCleaning(true);
    for(const file of files){try{const cleaned=await cleanImage(file);saveHistory();setQs(p=>[...p,'<img src="'+cleaned+'" style="max-width:100%;height:auto"/>']);setShow(true);}catch(err){const du=await new Promise(ok=>{const r=new FileReader();r.onload=()=>ok(r.result);r.readAsDataURL(file);});saveHistory();setQs(p=>[...p,'<img src="'+du+'" style="max-width:100%;height:auto"/>']);setShow(true);}}setCleaning(false);};
  const reconvert=async(i)=>{setConverting(i);try{const raw=await callAI([{type:"text",text:PROMPT_SCAN+"\n\nBu soruyu düzelt ve yeniden çevir:\n"+qs[i]}]);const j=parseJ(raw);if(j.questions?.length){saveHistory();const n=[...qs];n[i]=j.questions[0];setQs(n);}}catch(e){}setConverting(null);};
  const convertImgToText=async(i)=>{const q=qs[i];if(!q||!q.includes('<img'))return;setConverting(i);try{const src=q.match(/src="([^"]+)"/)?.[1];if(src){const b=src.split(",")[1],m=src.match(/^data:(image\/\w+);/)?.[1]||"image/png";const raw=await callAI([{type:"image",source:{type:"base64",media_type:m,data:b}},{type:"text",text:PROMPT_SCAN}]);const j=parseJ(raw);if(j.questions?.length){saveHistory();const n=[...qs];n[i]=j.questions[0];setQs(n);}}}catch(e){}setConverting(null);};
  const addTxt=()=>{const ls=txt.split("\n").map(l=>l.trim()).filter(Boolean);if(ls.length){saveHistory();setQs(p=>[...p,...ls]);setTxt("");setShow(true);}};
  const addFromCanvas=(dataUrl)=>{saveHistory();setQs(p=>[...p,'<img src="'+dataUrl+'" style="max-width:100%;height:auto"/>']);setShow(true);setDrawMode(false);};
  const recognizeFromCanvas=async(dataUrl)=>{setBusy(true);setErr("");try{const b=dataUrl.split(",")[1],m=dataUrl.match(/^data:(image\/\w+);/)?.[1]||"image/png";const raw=await callAI([{type:"image",source:{type:"base64",media_type:m,data:b}},{type:"text",text:PROMPT_FORMULA}]);const j=parseJ(raw);if(j.results?.length){saveHistory();setQs(p=>[...p,...j.results.map(r=>r.text)]);setShow(true);setDrawMode(false);}else setErr("Tanınamadı.");}catch(e){setErr(e.message==="Failed to fetch"?"Bağlantı kurulamadı.":e.message);}setBusy(false);};

  const printHtml=(title)=>`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title||"MathStudio"}</title><link href="${GF}" rel="stylesheet"><style>@page{size:A4;margin:0}*{box-sizing:border-box;margin:0;padding:0}body{margin:0}.pw-break{display:none}.pw-page{page-break-after:always}.pw-page:last-child{page-break-after:auto}.QTE,.QOA{background:none!important;box-shadow:none!important;border:none!important}.QOA:empty{display:none}.QSP,.QIS{display:none!important}${a4css(ff)}${mathCSS()}</style></head><body>${pvRef.current?.outerHTML||""}</body></html>`;
  const doPrint=()=>{
    const html=printHtml(cfg.konu);
    // Yöntem 1: window.open
    try{const w=window.open("","_blank");if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);return;}}catch(e){}
    // Yöntem 2: iframe (artifact sandbox'ta window.open engellenirse)
    try{let f=document.getElementById("ms-print-frame");
      if(!f){f=document.createElement("iframe");f.id="ms-print-frame";f.style.cssText="position:fixed;top:-9999px;left:-9999px;width:210mm;height:297mm;border:none;";document.body.appendChild(f);}
      f.contentDocument.open();f.contentDocument.write(html);f.contentDocument.close();
      setTimeout(()=>{try{f.contentWindow.print();}catch(e2){
        // Yöntem 3: Blob indirme
        const blob=new Blob([html],{type:"text/html"});const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download=(cfg.konu||"MathStudio")+"_Test.html";a.click();URL.revokeObjectURL(url);
        setErr("Yazdırma engellendi. HTML dosyası indirildi — indirilen dosyayı tarayıcıda açıp Ctrl+P ile yazdırabilirsiniz.");
      }},600);
    }catch(e3){setErr("Yazdırma başarısız: "+e3.message);}
  };
  const savePDF=()=>doPrint();

  const Sec=({n,title,icon,children})=>(
    <div className="acc">
      <button className={`acc-h${openSec===n?" acc-on":""}`} onClick={()=>setOpenSec(openSec===n?0:n)}><span className="acc-i">{icon}</span><span className="acc-t">{title}</span><span className="acc-arr">{openSec===n?"▾":"▸"}</span></button>
      {openSec===n&&<div className="acc-body">{children}</div>}
    </div>
  );

  return(<div className="ms"><link href={GF} rel="stylesheet"/><style>{uicss()}{a4css("inherit")}{mathCSS()}</style>
    <header className="hd"><div className="hr"><div className="hl"><div className="hi">∑</div><b className="hn">MathStudio</b></div>
      <div className="hd-acts">
        <button className="hd-btn" onClick={()=>setShowKeyInput(!showKeyInput)} style={{background:apiKey?"#e8f5e9":"#fff5f5",borderColor:apiKey?"#4caf50":"#f44",color:apiKey?"#2e7d32":"#d44"}}>{apiKey?"🔑 Key ✓":"🔑 Key Gir"}</button>
        {qs.length>0&&<><button className="hd-btn" onClick={doPrint}>🖨️</button><button className="hd-btn" onClick={savePDF}>📥 PDF</button></>}
      </div>
    </div>
    {showKeyInput&&<div style={{padding:"10px 18px",background:"#fffdf5",borderBottom:"1px solid #fde68a"}}>
      <p style={{fontSize:11,color:"#666",marginBottom:6}}>Google AI Studio'dan API key alın: <a href="https://aistudio.google.com/apikey" target="_blank" style={{color:"#2563eb"}}>aistudio.google.com/apikey</a></p>
      <div style={{display:"flex",gap:6}}>
        <input type="text" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="API key yapıştırın (AIzaSy...)" style={{flex:1,padding:"8px 12px",border:"1.5px solid #d8dce6",borderRadius:6,fontFamily:"monospace",fontSize:12}}/>
        <button onClick={()=>saveApiKey(apiKey)} style={{padding:"8px 16px",background:"#1b2a4a",color:"#fff",border:"none",borderRadius:6,fontWeight:700,cursor:"pointer",fontSize:12}}>Kaydet</button>
      </div>
      {apiKey&&<p style={{fontSize:10,color:"#4caf50",marginTop:4}}>✓ Key kaydedildi. Tarayıcı hafızasında saklanır, kimse görmez.</p>}
    </div>}
    </header>
    <main className="mn2">
      <div className="panel">
        <Sec n={1} title="Döküman Şablonu" icon="📋">
          <div className="p-grid">
            {[["yaprak","📝","Yaprak Test"],["sinav","📄","Sınav Kağıdı"],["konu","📖","Ders Notu"],["kitap","📚","Kitap Sayfası"]].map(([id,ic,nm])=>
              <button key={id} className={`p-card${tpl===id?" p-on":""}`} onClick={()=>setTpl(id)}><span className="p-ic">{ic}</span><span className="p-nm">{nm}</span></button>
            )}
          </div>
        </Sec>
        <Sec n={2} title="Döküman Bilgileri" icon="📝">
          {tpl==="yaprak"&&<div className="p-form">
            <input placeholder="Konu (MATEMATİK)" value={cfg.konu} onChange={e=>uc("konu",e.target.value)}/>
            <input placeholder="Alt başlık (Konu Testi)" value={cfg.alt} onChange={e=>uc("alt",e.target.value)}/>
            <input placeholder="Test No" value={cfg.no} onChange={e=>uc("no",e.target.value)} className="sm"/>
            <label className="p-chk"><input type="checkbox" checked={cfg.showInfo!==false} onChange={e=>uc("showInfo",e.target.checked)}/> Ad Soyad / D-Y-B</label>
            <label className="p-chk"><input type="checkbox" checked={cfg.showCevap!==false} onChange={e=>uc("showCevap",e.target.checked)}/> Cevap Anahtarı</label>
          </div>}
          {tpl==="sinav"&&<div className="p-form"><input placeholder="Okul Adı" value={cfg.okul} onChange={e=>uc("okul",e.target.value)}/><input placeholder="Sınav Başlığı" value={cfg.baslik} onChange={e=>uc("baslik",e.target.value)}/><input placeholder="Süre (dk)" value={cfg.sure} onChange={e=>uc("sure",e.target.value)} className="sm"/></div>}
          {(tpl==="konu"||tpl==="kitap")&&<div className="p-form"><input placeholder="Ünite" value={cfg.unite} onChange={e=>uc("unite",e.target.value)}/><input placeholder="Başlık" value={cfg.baslik} onChange={e=>uc("baslik",e.target.value)}/><input placeholder="Sayfa No" value={cfg.sayfaNo||""} onChange={e=>uc("sayfaNo",e.target.value)} className="sm"/></div>}
        </Sec>
        <Sec n={3} title="Sayfa Düzeni" icon="⚙️">
          <div className="p-row"><span className="p-lbl">Sütun</span><div className="p-btns">{[1,2,3].map(n=><button key={n} className={`p-sb${cols===n?" p-on":""}`} onClick={()=>setCols(n)}>{n}</button>)}</div></div>
          <div className="p-row"><span className="p-lbl">Yazı Stili</span><FontPick v={font} set={setFont}/></div>
          <div className="p-row"><span className="p-lbl">Yazı Boyutu</span><div className="p-sz"><button className="p-sb" onClick={()=>setQSize(s=>Math.max(8,s-0.5))}>−</button><span className="p-sv">{qSize}pt</span><button className="p-sb" onClick={()=>setQSize(s=>Math.min(16,s+0.5))}>+</button></div></div>
          <div className="p-row"><span className="p-lbl">Sayfa başına</span><select className="p-sel" value={perPage} onChange={e=>setPerPage(+e.target.value)}><option value={5}>5</option><option value={8}>8</option><option value={10}>10</option><option value={12}>12</option><option value={15}>15</option><option value={20}>20</option><option value={999}>Tümü</option></select></div>
          <div className="p-row"><span className="p-lbl">Numara</span><div className="p-btns p-wrap">{[["circle","●1"],["square","■1"],["plain","1)"],["dot","1."],["paren","(1)"],["dash","1-"],["none","—"]].map(([id,label])=><button key={id} className={`p-sb${(cfg.numStyle||"circle")===id?" p-on":""}`} onClick={()=>uc("numStyle",id)}>{label}</button>)}</div></div>
        </Sec>
        <Sec n={4} title="Soru Ekle" icon="➕">
          {err&&<div className="er" style={{margin:"0 0 8px"}}>⚠️ {err}</div>}
          {busy&&<div className="ld"><div className="lds"/>İşleniyor...</div>}
          {cleaning&&<div className="ld"><div className="lds"/>Temizleniyor...</div>}
          <div className="stabs" style={{marginBottom:8}}>
            <button className={`st${uploadSub==="draw"?" on":""}`} onClick={()=>{setUploadSub("draw");closeCam();}}>✏️ Elle Çizim</button>
            <button className={`st${uploadSub==="cam"?" on":""}`} onClick={()=>setUploadSub("cam")}>📷 Kamera</button>
            <button className={`st${uploadSub==="file"?" on":""}`} onClick={()=>{setUploadSub("file");closeCam();}}>📁 Dosyalar</button>
            <button className={`st${uploadSub==="txt"?" on":""}`} onClick={()=>{setUploadSub("txt");closeCam();}}>📝 Metin</button>
          </div>

          {uploadSub==="draw"&&<div>
            <Canvas onDone={recognizeFromCanvas} busy={busy} onAddAsImage={addFromCanvas}/>
          </div>}

          {uploadSub==="cam"&&<div>
            {camOn?<div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{position:"relative",borderRadius:10,overflow:"hidden",background:"#000"}}>
                <video ref={videoRef} playsInline autoPlay muted style={{width:"100%",maxHeight:280,display:"block",objectFit:"cover"}}/>
                <button onClick={closeCam} style={{position:"absolute",top:6,right:6,width:30,height:30,borderRadius:"50%",background:"rgba(220,40,40,.85)",border:"none",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
              <div className="scan-btns">
                <button className={`bup${busy?" wait":""}`} disabled={busy} onClick={()=>{setCamAct("text");snapAndProcess();}}>
                  {busy?"⏳ Çevriliyor...":"📝 Yazıya Çevir"}
                </button>
                <button className={`bup bup3${cleaning?" wait":""}`} disabled={cleaning} onClick={()=>{setCamAct("img");snapAndProcess();}}>
                  {cleaning?"⏳ Ekleniyor...":"🖼️ Resim Olarak Ekle"}
                </button>
              </div>
            </div>:
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <button className="bup" onClick={()=>openCam("text")} style={{width:"100%",justifyContent:"center",padding:"14px 20px",fontSize:13}}>📷 Kamerayı Aç</button>
              <p style={{fontSize:10,color:"#999",marginTop:6}}>Sorunun fotoğrafını çekin, sonra ne yapacağınızı seçin</p>
            </div>}
          </div>}

          {uploadSub==="file"&&<div>
            <div className="scan-btns">
              <label className={`bup${busy?" wait":""}`}>{busy?"⏳ Çevriliyor...":"📝 Seç ve Yazıya Çevir"}<input type="file" accept="image/*" multiple hidden disabled={busy} onChange={scan}/></label>
              <label className={`bup bup3${cleaning?" wait":""}`}>{cleaning?"⏳ Ekleniyor...":"🖼️ Seç ve Resim Olarak Ekle"}<input type="file" accept="image/*" multiple hidden disabled={cleaning} onChange={scanImg}/></label>
            </div>
          </div>}

          {uploadSub==="txt"&&<div>
            <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>
              <textarea className="p-ta" value={txt} onChange={e=>setTxt(e.target.value)} rows={3} placeholder="Soruyu klavyeden yazın..."/>
              <button className="p-tb" onClick={addTxt} disabled={!txt.trim()}>Ekle</button>
            </div>
          </div>}
        </Sec>
        {qs.length>0&&<div className="p-qs">
          <div className="p-qh">📋 {qs.length} Soru <button className="p-qcl" onClick={()=>{saveHistory();setQs([]);setShow(false);}}>Tümünü Sil</button>{history.length>0&&<button className="p-qu" onClick={undo}>↩</button>}</div>
          <div className="p-ql">{qs.map((q,i)=><QItem key={`q${i}`} index={i} html={q} onUpdate={(val)=>{const n=[...qs];n[i]=val;setQs(n);}} onDelete={()=>delQ(i)} onCopy={()=>copyQ(i)}
            onReconvert={typeof q==="string"&&q.includes("<img")?()=>convertImgToText(i):()=>reconvert(i)} reconverting={converting===i}
            onDragStart={setDragIdx} onDragOver={setOverIdx} onDrop={handleDrop} dragging={overIdx===i&&dragIdx!==i}/>)}</div>
        </div>}
      </div>
      <div className="preview">
