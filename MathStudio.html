let GEMINI_KEY="";
try{GEMINI_KEY=localStorage.getItem("ms_api_key")||"";}catch(e){}

async function callAI(content,model){
  if(!GEMINI_KEY)throw new Error("API key girilmedi! Sağ üstteki 🔑 butonuna basıp key girin.");
  const parts=[];
  for(const c of content){
    if(c.type==="text") parts.push({text:c.text});
    else if(c.type==="image") parts.push({inlineData:{mimeType:c.source.media_type,data:c.source.data}});
  }
  const body=JSON.stringify({contents:[{parts}]});
  // Otomatik tekrar deneme: 503/500/502 ve ağ hataları için exponential backoff
  const maxRetries=4;
  let lastError=null;
  for(let attempt=0;attempt<maxRetries;attempt++){
    try{
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model||"gemini-2.5-flash-lite"}:generateContent?key=${GEMINI_KEY}`,{
        method:"POST",headers:{"Content-Type":"application/json"},body
      });
      if(r.ok){
        const d=await r.json();
        if(d.error)throw new Error(d.error.message);
        return d.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||"";
      }
      // Tekrar denenebilir hatalar (geçici sunucu sorunları)
      if(r.status===503||r.status===500||r.status===502||r.status===504){
        const wait=Math.pow(2,attempt)*1000+Math.random()*500; // 1s, 2s, 4s, 8s + jitter
        if(attempt<maxRetries-1){
          console.log(`Gemini ${r.status} - ${Math.round(wait/1000)}sn sonra tekrar deneniyor (${attempt+1}/${maxRetries})...`);
          await new Promise(res=>setTimeout(res,wait));
          continue;
        }
        throw new Error(`Gemini sunucusu meşgul (${r.status}). Birkaç saniye bekleyip tekrar deneyin.`);
      }
      // Tekrar denenemeyecek hatalar — hemen at
      if(r.status===429)throw new Error("API limiti doldu. Birkaç dakika bekleyip tekrar deneyin.");
      if(r.status===403)throw new Error("API key geçersiz veya yetkisiz. Yeni key alıp 🔑 butonundan girin.");
      if(r.status===404)throw new Error("Model bulunamadı. Sayfayı yenileyin (Ctrl+F5).");
      if(r.status===400){
        let det="";try{const ed=await r.json();det=ed?.error?.message||"";}catch(e){}
        throw new Error("İstek hatası: "+(det||"API key geçersiz olabilir, 🔑 butonundan kontrol edin."));
      }
      throw new Error("Bağlantı hatası ("+r.status+")");
    }catch(e){
      // Ağ hatası (Failed to fetch) gibi durumlarda da tekrar dene
      lastError=e;
      if(e.message&&(e.message.includes("Failed to fetch")||e.message.includes("NetworkError"))){
        if(attempt<maxRetries-1){
          await new Promise(res=>setTimeout(res,Math.pow(2,attempt)*1000));
          continue;
        }
      }
      throw e;
    }
  }
  throw lastError||new Error("Bağlantı kurulamadı");
}
// LaTeX \ işaretleri JSON'u bozar (\angle, \frac geçersiz escape) — JSON-safe yap
function fixLatexEscapes(str){
  // 1) Geçerli JSON kaçışı olmayan \X (örn. \l, \s) → \\X
  let s=str.replace(/\\(?!["\\/bfnrtu])/g,'\\\\');
  // 2) \t \f \b \r geçerli JSON kaçışı OLDUĞU için yukarıdaki kural atlıyor.
  //    Ama harf takip ediyorsa muhtemelen LaTeX komutu (\to, \theta, \frac, \forall, \beta, \binom, \rho, \rightarrow).
  //    Zaten escape edilmemişse (önünde tek sayıda \ varsa) double-escape ekle.
  s=s.replace(/(\\*)\\([tfbr])(?=[a-zA-Z])/g,function(m,lead,ch){
    return (lead.length%2===0) ? (lead+'\\\\'+ch) : m;
  });
  return s;
}
// Tırnaksız anahtar isimlerini tırnakla ({text: → {"text":)
function quoteKeys(str){
  return str.replace(/([{,]\s*)([a-zA-Z_$][\w$]*)(\s*:)/g,'$1"$2"$3');
}
function parseJ(r){
  let s=r.trim().replace(/^```(?:json)?\s*/i,"").replace(/\s*```$/i,"").trim();
  const i=s.indexOf("{");if(i<0)throw new Error("JSON yok");
  const lastBrace=s.lastIndexOf("}");
  s=(lastBrace>i)?s.slice(i,lastBrace+1):s.slice(i);
  // Sırayla onarım denemeleri.
  // ÖNEMLİ: Identity (x)=>x KALDIRILDI! AI \frac{x}{y} dönerse JSON.parse \f'yi form feed,
  // \t'yi tab olarak yiyor (bozuk parse SESSİZCE başarılı oluyor) → her zaman önce fix uygula.
  const attempts=[
    (x)=>fixLatexEscapes(x),                        // LaTeX backslash fix
    (x)=>fixLatexEscapes(quoteKeys(x)),             // + tırnaksız anahtar fix
    (x)=>fixLatexEscapes(quoteKeys(x.replace(/'/g,'"'))) // + tek tırnak → çift
  ];
  for(const fn of attempts){
    try{return JSON.parse(fn(s));}catch(e){}
  }
  // Kesik JSON onarımı
  try{
    let f=fixLatexEscapes(quoteKeys(s));
    const lastQuote=f.lastIndexOf('"');
    const beforeQuote=f.substring(0,lastQuote);
    const openQuotes=(beforeQuote.match(/(?<!\\)"/g)||[]).length;
    if(openQuotes%2!==0)f=f.substring(0,lastQuote)+'"';
    f=f.replace(/,\s*$/,'');
    if(!f.includes(']'))f+='"]';
    if(!f.endsWith('}'))f+='}';
    return JSON.parse(f);
  }catch(e2){
    // Son çare — string'leri manuel çıkar
    const matches=[...s.matchAll(/"((?:[^"\\]|\\.)*)"/g)].map(m=>m[1].replace(/\\"/g,'"'));
    if(matches.length>1)return{questions:matches.slice(1)};
    throw new Error("JSON çözümlenemedi");
  }
}

  useEffect(()=>{const h=e=>{if(r.current&&!r.current.contains(e.target))setO(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);
  return(<div className="fp" ref={r}>

function Canvas({onDone,busy,onAddAsImage}){
  const ref=useRef();const drawing=useRef(false);const startPt=useRef(null);const pathPts=useRef([]);const snapshot=useRef(null);const lastPt=useRef(null);

  // === YENİ: Hazır şekil + Snap-to-grid + Local şekil tanıma ===

    }
    if(drawing.current&&tool==="pen"&&pathPts.current.length>4&&snapshot.current){
      restoreSnap();
      // Otomatik şekil tanıma açıksa, çizgiyi temiz versiyonuyla değiştir

        const recognized=recognizeStroke(pathPts.current);

    x.strokeStyle="#444";x.lineWidth=1.5;x.beginPath();x.moveTo(0,cy);x.lineTo(w,cy);x.stroke();x.beginPath();x.moveTo(cx,0);x.lineTo(cx,h);x.stroke();
    x.beginPath();x.moveTo(w-2,cy);x.lineTo(w-10,cy-5);x.moveTo(w-2,cy);x.lineTo(w-10,cy+5);x.stroke();
    x.beginPath();x.moveTo(cx,2);x.lineTo(cx-5,10);x.moveTo(cx,2);x.lineTo(cx+5,10);x.stroke();
    let num;x.fillStyle="#888";x.font="10px 'DM Sans',sans-serif";x.textAlign="center";x.strokeStyle="#444";x.lineWidth=1;

    num=-1;for(let i=cx-step;i>15;i-=step){x.beginPath();x.moveTo(i,cy-3);x.lineTo(i,cy+3);x.stroke();if(g.nums)x.fillText(num,i,cy+14);num--;}
    num=1;for(let i=cy-step;i>15;i-=step){x.beginPath();x.moveTo(cx-3,i);x.lineTo(cx+3,i);x.stroke();if(g.nums)x.fillText(num,cx-12,i+4);num++;}
    num=-1;for(let i=cy+step;i<h-15;i+=step){x.beginPath();x.moveTo(cx-3,i);x.lineTo(cx+3,i);x.stroke();if(g.nums)x.fillText(num,cx-12,i+4);num--;}
    x.fillStyle="#444";x.font="bold 12px 'DM Sans',sans-serif";x.fillText("x",w-10,cy-10);x.fillText("y",cx+10,14);x.fillText("O",cx-12,cy+14);

    {label:"İşaret",tools:[{id:"arc",icon:"⌒",tip:"Açı yayı"},{id:"right",icon:"⊾",tip:"Dik açı"},{id:"parallel",icon:"∥",tip:"Paralel"},{id:"tick",icon:"╫",tip:"Eşit kenar"},{id:"dot",icon:"●",tip:"Nokta"},{id:"fill",icon:"🪣",tip:"Boya"}]},
    {label:"Metin",tools:[{id:"text",icon:"A",tip:"Metin"}]},
  ];

  return(<div className="cv-wrap">
    <div className="cvb">
      {toolGroups.map((g,gi)=><div key={gi} className="cvb-grp">

/* ═══ S1 — Formül Çevir ═══ */
function S1({font,sendToS2}){
  const[res,setRes]=useState([]);const[mode,setMode]=useState("draw");const[busy,setBusy]=useState(false);const[err,setErr]=useState("");const[cp,setCp]=useState(null);
  const[fsize,setFsize]=useState(20); // formula display size in px
  const ff=(FONTS.find(f=>f.id===font)||FONTS[0]).f;
  const recognize=async(du)=>{setBusy(true);setErr("");try{
    const b=du.split(",")[1],m=du.match(/^data:(image\/\w+);/)?.[1]||"image/png";
    const raw=await callAI([{type:"image",source:{type:"base64",media_type:m,data:b}},{type:"text",text:PROMPT_FORMULA}]);
    const j=parseJ(raw);if(j.results?.length)setRes(p=>[...p,...j.results]);else setErr("Tanınamadı.");
  }catch(e){setErr(e.message==="Failed to fetch"?"Bağlantı kurulamadı. İnternet bağlantınızı kontrol edin.":e.message);}setBusy(false);};
  const copy=(t,k)=>{navigator.clipboard?.writeText(t);setCp(k);setTimeout(()=>setCp(null),1500);};
  return(<div className="sc">
    <div className="stabs"><button className={`st${mode==="draw"?" on":""}`} onClick={()=>setMode("draw")}>✏️ Elle Yaz</button><button className={`st${mode==="img"?" on":""}`} onClick={()=>setMode("img")}>📷 Resim</button></div>
    {mode==="draw"&&<Canvas onDone={recognize} busy={busy} onAddAsImage={(dataUrl)=>{sendToS2('<img src="'+dataUrl+'" style="max-width:100%;height:auto"/>');}}/>}
    {mode==="img"&&<label className="upz">{busy?<><div className="ups"/><span>Tanınıyor...</span></>:<><span style={{fontSize:28}}>📷</span><span>Formül fotoğrafı yükle</span></>}<input type="file" accept="image/*" hidden disabled={busy} onChange={e=>{const f=e.target.files?.[0];e.target.value="";if(f){const r=new FileReader();r.onload=()=>recognize(r.result);r.readAsDataURL(f);}}}/></label>}
    {err&&<div className="er">⚠️ {err}</div>}
    {res.length>0&&<div className="rl"><div className="rlh"><b>Formüller ({res.length})</b><div className="rsz"><button className="rsb" onClick={()=>setFsize(s=>Math.max(12,s-2))}>A−</button><span className="rst">{fsize}px</span><button className="rsb" onClick={()=>setFsize(s=>Math.min(40,s+2))}>A+</button></div><button className="bxx" onClick={()=>setRes([])}>Temizle</button></div>
      {res.map((r,i)=><div key={i} className="rc">
        <div className="rcm" style={{fontFamily:ff,fontSize:fsize+'px'}} dangerouslySetInnerHTML={{__html:r.text}}/>
        {r.latex&&r.latex!==r.text&&<div className="rcl">LaTeX: {r.latex}</div>}
        <div className="rca">
          <button className={`bcp${cp===`${i}t`?" ok":""}`} onClick={()=>copy(r.text,`${i}t`)}>{cp===`${i}t`?"✓ Kopyalandı":"📋 Kopyala"}</button>
          {r.latex&&<button className={`bcp bcp2${cp===`${i}l`?" ok":""}`} onClick={()=>copy(r.latex,`${i}l`)}>{cp===`${i}l`?"✓ Kopyalandı":"📋 LaTeX"}</button>}
          <button className="bcp bcp3" onClick={()=>sendToS2(r.text)}>📤 Soru Tara'ya Ekle</button>
        </div>
      </div>)}
    </div>}
  </div>);
}

/* ═══ Editable Question Item with Drag + Copy ═══ */
function QItem({index,html,onUpdate,onDelete,onCopy,onDragStart,onDragOver,onDrop,dragging,onReconvert,reconverting}){
  const ref=useRef();
  const handleBlur=()=>{
    if(ref.current) onUpdate(ref.current.innerHTML);
  };
  const isImg=typeof html==='string'&&html.startsWith('<img ');
  return(
    <div className={`qr${dragging?" qr-drag":""}`}
      draggable onDragStart={e=>{e.dataTransfer.effectAllowed="move";onDragStart(index);}}
      onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect="move";onDragOver(index);}}
      onDrop={e=>{e.preventDefault();onDrop(index);}}>
      <span className="qhandle" title="Sürükle">⠿</span>
      <span className="qn">{index+1}</span>
      {isImg?<div className="qimg"><img src={html.match(/src="([^"]+)"/)?.[1]} style={{maxWidth:"100%",maxHeight:120}}/></div>:
      <div className="qce" ref={ref} contentEditable suppressContentEditableWarning
        dangerouslySetInnerHTML={{__html:html}} onBlur={handleBlur}/>}
      <div className="qbtns">
        {onReconvert&&<button className="qcv" disabled={reconverting} onClick={onReconvert} title={isImg?"Metne çevir":"AI ile tekrar çevir"}>{reconverting?"⏳":"🔄"}</button>}
        <button className="qcp" onClick={onCopy} title="Kopyala">📋</button>
        <button className="qd" onClick={onDelete} title="Sil">✕</button>
      </div>
    </div>
  );
}

/* ═══ S2 — Soru Tara (AI HTML çıktı) ═══ */
function S2({font,setFont,clipboard,clearClip,setClip}){
  const[qs,setQs]=useState([]);
  const[tpl,setTpl]=useState("yaprak");const[cols,setCols]=useState(2);
  const[cfg,setCfg]=useState({konu:"MATEMATİK",alt:"Konu Testi",no:"01",opt:5,okul:"",baslik:"",sure:"40",unite:"ÜNİTE 1"});
  const[busy,setBusy]=useState(false);const[err,setErr]=useState("");const[show,setShow]=useState(false);const[txt,setTxt]=useState("");
  const[addMode,setAddMode]=useState("text"); // text | shape | graph
  const[shapeDesc,setShapeDesc]=useState("");const[shapeLoading,setShapeLoading]=useState(false);
  const[cleaning,setCleaning]=useState(false);
  const[loaded,setLoaded]=useState(false);

  // Açılışta kayıtlı çalışmayı yükle
  useEffect(()=>{
    (async()=>{
      try{
        const r=await window.storage?.get("mathstudio-s2");
        if(r&&r.value){
          const d=JSON.parse(r.value);
          // Sadece string olan soruları yükle (object olanları filtrele)
          if(d.qs?.length){setQs(d.qs.filter(q=>typeof q==='string'));setShow(true);}
          if(d.tpl)setTpl(d.tpl);
          if(d.cols)setCols(d.cols);
          if(d.cfg)setCfg(c=>({...c,...d.cfg}));
        }
      }catch(e){}
      setLoaded(true);
    })();
  },[]);

  // Sorular değişince otomatik kaydet
  useEffect(()=>{
    if(!loaded)return;
    (async()=>{
      try{await window.storage?.set("mathstudio-s2",JSON.stringify({qs,tpl,cols,cfg}));}catch(e){}
    })();
  },[qs,tpl,cols,cfg,loaded]);
  const[graphFns,setGraphFns]=useState([{fn:"x*x-4*x+3",color:"#2563eb",label:"f(x)"}]);
  const[graphXmin,setGraphXmin]=useState(-2);const[graphXmax,setGraphXmax]=useState(6);
  const[graphYmin,setGraphYmin]=useState("auto");const[graphYmax,setGraphYmax]=useState("auto");
  const[graphGrid,setGraphGrid]=useState(true);const[graphRoots,setGraphRoots]=useState(true);const[graphNums,setGraphNums]=useState(true);

  const addGraphFn=()=>{
    const colors=["#2563eb","#c00","#16a34a","#9333ea","#d97706"];
    const labels=["f(x)","g(x)","h(x)","p(x)","q(x)"];

  const updateGraphFn=(i,key,val)=>setGraphFns(f=>f.map((g,j)=>j===i?{...g,[key]:val}:g));
  const removeGraphFn=(i)=>setGraphFns(f=>f.filter((_,j)=>j!==i));

  const generateGraph=()=>{
    try{
      const xmin=Number(graphXmin),xmax=Number(graphXmax);
      const W=graphSize,H=Math.round(graphSize*0.75),pad=35;
      const pw=W-2*pad,ph=H-2*pad;
      
      // Tüm fonksiyonların noktalarını hesapla
      let globalYmin=Infinity,globalYmax=-Infinity;
      const allCurves=graphFns.filter(g=>g.fn.trim()).map(g=>{
        const fn2=g.fn.replace(/\^/g,'**');
        const pts=[];
        for(let i=0;i<=200;i++){
          const x=xmin+(xmax-xmin)*i/200;
          try{const y=Function('x','return '+fn2)(x);if(isFinite(y)&&Math.abs(y)<1e6){pts.push({x,y});globalYmin=Math.min(globalYmin,y);globalYmax=Math.max(globalYmax,y);}}catch(e){}
        }
        return{...g,pts,fn2};
      });
      if(!allCurves.length)return;
      
      // Y aralığı
      const ym=globalYmax-globalYmin||1;
      let ymin=graphYmin==="auto"?globalYmin-ym*0.1:Number(graphYmin);
      let ymax=graphYmax==="auto"?globalYmax+ym*0.1:Number(graphYmax);
      if(ymin>=ymax){ymin=globalYmin-1;ymax=globalYmax+1;}
      
      const sx=x=>(pad+(x-xmin)/(xmax-xmin)*pw);
      const sy=y=>(pad+(ymax-y)/(ymax-ymin)*ph);
      
      let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:#fff">`;
      
      // Izgara
      if(graphGrid){
        for(let i=Math.ceil(xmin);i<=Math.floor(xmax);i++){const px=sx(i);svg+=`<line x1="${px}" y1="${pad}" x2="${px}" y2="${H-pad}" stroke="#f0f0f0" stroke-width="0.5"/>`;}
        for(let i=Math.ceil(ymin);i<=Math.floor(ymax);i++){const py=sy(i);svg+=`<line x1="${pad}" y1="${py}" x2="${W-pad}" y2="${py}" stroke="#f0f0f0" stroke-width="0.5"/>`;}
      }
      
      // Eksenler
      const ox=sx(0),oy=sy(0);
      if(ox>=pad&&ox<=W-pad)svg+=`<line x1="${ox}" y1="${pad-5}" x2="${ox}" y2="${H-pad+5}" stroke="#555" stroke-width="1.2"/>`;
      if(oy>=pad&&oy<=H-pad)svg+=`<line x1="${pad-5}" y1="${oy}" x2="${W-pad+5}" y2="${oy}" stroke="#555" stroke-width="1.2"/>`;
      // Ok uçları
      if(ox>=pad&&ox<=W-pad)svg+=`<polygon points="${ox},${pad-5} ${ox-3},${pad+2} ${ox+3},${pad+2}" fill="#555"/>`;
      if(oy>=pad&&oy<=H-pad)svg+=`<polygon points="${W-pad+5},${oy} ${W-pad-2},${oy-3} ${W-pad-2},${oy+3}" fill="#555"/>`;
      svg+=`<text x="${W-pad+8}" y="${(oy||H-pad)+4}" font-size="12" fill="#555" font-weight="600">x</text>`;
      svg+=`<text x="${(ox||pad)+6}" y="${pad-8}" font-size="12" fill="#555" font-weight="600">y</text>`;
      
      // Sayı işaretleri
      if(graphNums){
        for(let i=Math.ceil(xmin);i<=Math.floor(xmax);i++){
          if(i===0)continue;const px=sx(i);
          svg+=`<line x1="${px}" y1="${(oy||H-pad)-3}" x2="${px}" y2="${(oy||H-pad)+3}" stroke="#555" stroke-width="0.8"/>`;
          svg+=`<text x="${px}" y="${(oy||H-pad)+14}" font-size="9" fill="#888" text-anchor="middle">${i}</text>`;
        }
        for(let i=Math.ceil(ymin);i<=Math.floor(ymax);i++){
          if(i===0)continue;const py=sy(i);
          svg+=`<line x1="${(ox||pad)-3}" y1="${py}" x2="${(ox||pad)+3}" y2="${py}" stroke="#555" stroke-width="0.8"/>`;
          svg+=`<text x="${(ox||pad)-8}" y="${py+3}" font-size="9" fill="#888" text-anchor="end">${i}</text>`;
        }
        if(ox>=pad&&ox<=W-pad&&oy>=pad&&oy<=H-pad)svg+=`<text x="${ox-8}" y="${oy+14}" font-size="9" fill="#888">0</text>`;
      }
      
      // Eğriler
      allCurves.forEach(curve=>{
        const pathPts=curve.pts.map(p=>`${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`);
        svg+=`<polyline points="${pathPts.join(' ')}" fill="none" stroke="${curve.color}" stroke-width="2.2" stroke-linecap="round"/>`;
        
        // Kökler (y≈0 olan noktalar)
        if(graphRoots){
          for(let i=1;i<curve.pts.length;i++){
            const p1=curve.pts[i-1],p2=curve.pts[i];
            if(p1.y*p2.y<=0&&Math.abs(p1.y-p2.y)>0.001){
              const t=-p1.y/(p2.y-p1.y);const rx=p1.x+t*(p2.x-p1.x);
              svg+=`<circle cx="${sx(rx).toFixed(1)}" cy="${sy(0).toFixed(1)}" r="4" fill="${curve.color}" stroke="#fff" stroke-width="1.5"/>`;
              svg+=`<text x="${sx(rx).toFixed(1)}" y="${sy(0)-8}" font-size="8" fill="${curve.color}" text-anchor="middle">${rx.toFixed(1)}</text>`;
            }
          }
        }
        // Etiket
        const lastPt=curve.pts[curve.pts.length-1];
        if(lastPt)svg+=`<text x="${sx(lastPt.x)-5}" y="${sy(lastPt.y)-8}" font-size="10" fill="${curve.color}" font-weight="600" font-style="italic">${curve.label}</text>`;
      });
      
      svg+=`</svg>`;
      saveHistory();
      setQs(p=>[...p,`<div class="qsvg">${svg}</div>`]);
      setShow(true);
    }catch(e){setErr("Fonksiyon hatası: "+e.message);}
  };
  const[dragIdx,setDragIdx]=useState(null);const[overIdx,setOverIdx]=useState(null);

Açıklama: ${shapeDesc}

    }catch(e){}setConverting(null);
  };
  const printHtml=(title)=>`<!DOCTYPE html><html><head><title>${title||"MathStudio"}</title><link href="${GF}" rel="stylesheet"><style>@page{size:A4;margin:0}*{box-sizing:border-box;margin:0;padding:0}body{margin:0}.pw-break{display:none}.pw-page{page-break-after:always}.pw-page:last-child{page-break-after:auto}.QTE,.QOA{background:none!important;box-shadow:none!important;border:none!important}.QOA:empty{display:none}.QSP,.QIS,.etb,.etb *,.QOA-tools,.q-tools,.pw-tools,.q-del,.q-edit,.q-imgbtn,[contenteditable]{outline:none!important;box-shadow:none!important}.QSP,.QIS,.etb,.QOA-tools,.q-tools,.pw-tools,.q-del,.q-edit,.q-imgbtn,.QXIC{display:none!important}.QTE,.QTE:hover,.QTE:focus,.QOA,.QOA:hover,.QOA:focus{background:transparent!important;box-shadow:none!important;outline:none!important}.QOA:empty,.QOA:empty::before{display:none!important;content:none!important}.HbkE,.HbaE,.HinfE,.HduE,.HdbE,.HzhE,.HsiE,.HhdE{box-shadow:none!important;outline:none!important}body,html,.A4{background:#fff!important}${CMU_FONT_FACE}${a4css(ff)}${mathCSS()}</style></head><body>${pvRef.current?.outerHTML||""}</body></html>`;
  const print=()=>{const w=window.open("","_blank");if(!w)return;w.document.write(printHtml(cfg.konu+" - "+cfg.alt));w.document.close();setTimeout(()=>w.print(),500);};
  const savePDF=()=>{const w=window.open("","_blank");if(!w)return;w.document.write(printHtml((cfg.konu||"MathStudio")+"_"+(cfg.alt||"Test")));w.document.close();setTimeout(()=>w.print(),500);};

  return(<div className="sc">

        <label className={`bup bup4${busy?" wait":""}`}>{busy?"⏳ Düzenleniyor...":"📖 Tara → Kitap Sayfası"}<span className="bup-desc">Konu anlatımını kitap formatında düzenler</span><input type="file" accept="image/*" multiple hidden disabled={busy} onChange={scanBook}/></label>

        })}

/* ═══ Image cleaner - adaptive background removal ═══ */
function cleanImage(file){
  return new Promise(async(resolve)=>{
    try{
      const bitmap=await createImageBitmap(file);
      let cv=document.createElement("canvas");
      let w=bitmap.width,h=bitmap.height;
      // 0) ÇOK BÜYÜK FOTOĞRAFI KÜÇÜLT (hız + bellek)
      const MAX_DIM=2200;
      if(Math.max(w,h)>MAX_DIM){const sc=MAX_DIM/Math.max(w,h);w=Math.round(w*sc);h=Math.round(h*sc);}
      cv.width=w;cv.height=h;
      let ctx=cv.getContext("2d",{willReadFrequently:true});
      ctx.drawImage(bitmap,0,0,w,h);
      let imgData=ctx.getImageData(0,0,w,h);
      let d=imgData.data;
      const N=w*h;

      // 1) Gri tonlama dizisi (her preprocessing adımından sonra yeniden hesaplanır)
      let gray=new Float32Array(N);
      const _grayRecompute=()=>{for(let i=0,j=0;i<d.length;i+=4,j++){gray[j]=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;}};
      _grayRecompute();

      // 1A) GÖLGE KALDIRMA — arka plan parlaklık haritasıyla ışığı eşitle.
      // Görüntüyü karelere böler, her karedeki EN PARLAK pikseli "boş kağıt" sayar,
      // sonra her pikseli yerel parlaklığa böler → el/lamba gölgesi kaybolur, leke gri patches eşitlenir.
      {
        const TILE=Math.max(24,Math.round(Math.min(w,h)/22));
        const bw=Math.ceil(w/TILE),bh=Math.ceil(h/TILE);
        const bg=new Float32Array(bw*bh);
        for(let by=0;by<bh;by++)for(let bx=0;bx<bw;bx++){
          let m=0;
          const x0=bx*TILE,y0=by*TILE,x1=Math.min(w,x0+TILE),y1=Math.min(h,y0+TILE);
          for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){const v=gray[y*w+x];if(v>m)m=v;}
          bg[by*bw+bx]=m||255;
        }
        // 3x3 mean blur (yumuşak geçiş)
        const bgS=new Float32Array(bw*bh);
        for(let by=0;by<bh;by++)for(let bx=0;bx<bw;bx++){
          let s=0,c=0;
          for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
            const ny=by+dy,nx=bx+dx;if(ny<0||ny>=bh||nx<0||nx>=bw)continue;
            s+=bg[ny*bw+nx];c++;
          }
          bgS[by*bw+bx]=s/c;
        }
        // Bilinear interpolasyonla piksele uygula
        for(let y=0;y<h;y++){
          const fy=y/TILE,by0=Math.min(bh-1,Math.floor(fy)),by1=Math.min(bh-1,by0+1),fyf=fy-by0;
          for(let x=0;x<w;x++){
            const fx=x/TILE,bx0=Math.min(bw-1,Math.floor(fx)),bx1=Math.min(bw-1,bx0+1),fxf=fx-bx0;
            const v00=bgS[by0*bw+bx0],v01=bgS[by0*bw+bx1],v10=bgS[by1*bw+bx0],v11=bgS[by1*bw+bx1];
            const bgL=(v00*(1-fxf)+v01*fxf)*(1-fyf)+(v10*(1-fxf)+v11*fxf)*fyf;
            const fac=250/(bgL||1);
            const i=(y*w+x)*4;
            d[i]=Math.min(255,d[i]*fac);d[i+1]=Math.min(255,d[i+1]*fac);d[i+2]=Math.min(255,d[i+2]*fac);
          }
        }
        ctx.putImageData(imgData,0,0);
        _grayRecompute();
      }

      // 1B) DESKEW — eğri çekilmişse otomatik düzleştir.
      // Küçük thumbnail üzerinde -8°..+8° rotasyonları dener; "satır toplam varyansı"
      // en yüksek olan açı = metin satırlarının yatay olduğu açı.
      {
        const TH=180;
        const sw=Math.max(80,Math.round(w*TH/Math.max(w,h)));
        const sh2=Math.max(80,Math.round(h*TH/Math.max(w,h)));
        const thumb=document.createElement("canvas");thumb.width=sw;thumb.height=sh2;
        const tctx=thumb.getContext("2d");tctx.imageSmoothingEnabled=true;
        tctx.drawImage(cv,0,0,sw,sh2);
        const tData=tctx.getImageData(0,0,sw,sh2).data;
        const tg=new Float32Array(sw*sh2);
        for(let i=0,j=0;i<tData.length;i+=4,j++){tg[j]=255-(tData[i]*0.299+tData[i+1]*0.587+tData[i+2]*0.114);}
        const rowVar=(aDeg)=>{
          const a=aDeg*Math.PI/180,cs=Math.cos(a),sn=Math.sin(a),cx=sw/2,cy=sh2/2;
          const rows=new Float32Array(sh2);
          for(let y=0;y<sh2;y++){const dy=y-cy;for(let x=0;x<sw;x++){const dx=x-cx;const ny=(cy+(-sn*dx+cs*dy))|0;if(ny>=0&&ny<sh2)rows[ny]+=tg[y*sw+x];}}
          let m=0;for(let y=0;y<sh2;y++)m+=rows[y];m/=sh2;
          let v=0;for(let y=0;y<sh2;y++){const e=rows[y]-m;v+=e*e;}
          return v;
        };
        const baseV=rowVar(0);
        let bestA=0,bestV=baseV;
        for(let aDeg=-8;aDeg<=8;aDeg+=0.5){if(Math.abs(aDeg)<0.001)continue;const v=rowVar(aDeg);if(v>bestV){bestV=v;bestA=aDeg;}}
        // Sadece anlamlı eğrilikte döndür: en az 1° VE %8'den fazla iyileşme (yanlış pozitif önlemi)
        if(Math.abs(bestA)>=1&&bestV>baseV*1.08){
          const a=bestA*Math.PI/180;
          const rotCv=document.createElement("canvas");rotCv.width=w;rotCv.height=h;
          const rctx=rotCv.getContext("2d",{willReadFrequently:true});
          rctx.fillStyle="#fff";rctx.fillRect(0,0,w,h);
          rctx.translate(w/2,h/2);rctx.rotate(-a);rctx.translate(-w/2,-h/2);
          rctx.drawImage(cv,0,0);
          cv=rotCv;ctx=rctx;
          imgData=ctx.getImageData(0,0,w,h);
          d=imgData.data;
          _grayRecompute();
        }
      }

      // 2) İntegral görüntü (hızlı kutu toplamı için)
      const intg=new Float64Array(N);
      for(let y=0;y<h;y++){
        let rowSum=0;
        for(let x=0;x<w;x++){
          rowSum+=gray[y*w+x];
          intg[y*w+x]=rowSum+(y>0?intg[(y-1)*w+x]:0);
        }
      }
      const boxSum=(x1,y1,x2,y2)=>{
        const A=(y1>0&&x1>0)?intg[(y1-1)*w+(x1-1)]:0;
        const B=(y1>0)?intg[(y1-1)*w+x2]:0;
        const C=(x1>0)?intg[y2*w+(x1-1)]:0;
        const D=intg[y2*w+x2];
        return D-B-C+A;
      };

      // 3) ADAPTİF eşikleme — pencere yarıçapı görüntü boyutunun ~%5'i
      // Düzgün olmayan ışık altında bile gri lekeleri kaldırır
      const r=Math.max(25,Math.round(Math.min(w,h)*0.05));
      const bias=20; // beyaza eğilim arttırıldı — gri patches'i de beyaza zorlar

      // 4) Eşikleme + kırpma sınırları
      let minX=w,minY=h,maxX=0,maxY=0;
      for(let y=0;y<h;y++){
        for(let x=0;x<w;x++){
          const x1=x-r<0?0:x-r;
          const y1=y-r<0?0:y-r;
          const x2=x+r>=w?w-1:x+r;
          const y2=y+r>=h?h-1:y+r;
          const area=(x2-x1+1)*(y2-y1+1);
          const localAvg=boxSum(x1,y1,x2,y2)/area;
          const i=(y*w+x)*4;
          const gv=gray[y*w+x];

          if(gv>localAvg-bias){
            // Yerel arka plan veya daha aydınlık → TERTEMİZ BEYAZ
            d[i]=255;d[i+1]=255;d[i+2]=255;
          }else{
            // Yazı/şekil — KORU ve hafif koyulaştır (silik olmasın)
            const ratio=gv/(localAvg+1);
            const enhance=Math.pow(ratio,1.5);
            d[i]=Math.max(0,Math.round(d[i]*enhance));
            d[i+1]=Math.max(0,Math.round(d[i+1]*enhance));
            d[i+2]=Math.max(0,Math.round(d[i+2]*enhance));
            // İçerik bounding box (sadece kuvvetli içerik say)
            if(gv<localAvg-bias-15){
              if(x<minX)minX=x;
              if(x>maxX)maxX=x;
              if(y<minY)minY=y;
              if(y>maxY)maxY=y;
            }
          }
          d[i+3]=255;
        }
      }

      // 4.5) SON TEMİZLİK — açık gri pikselleri saf beyaza, koyu olanları daha keskin
      for(let i=0;i<d.length;i+=4){
        const gv=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
        if(gv>=170){
          // Açık gri → tertemiz beyaz (eşik 180'den 170'e indirildi — gölgesi alınmış girdiyle daha agresif beyazlatma)
          d[i]=255;d[i+1]=255;d[i+2]=255;
        }else if(gv<=110){
          // Yazı/şekil → daha keskin/koyu
          const k=0.7;
          d[i]=Math.max(0,Math.round(d[i]*k));
          d[i+1]=Math.max(0,Math.round(d[i+1]*k));
          d[i+2]=Math.max(0,Math.round(d[i+2]*k));
        }
        // 110-180 arası: sınır pikseller (kalem ucu yumuşaklığı), dokunulmaz
      }
      ctx.putImageData(imgData,0,0);

      // 4.6) KENAR GÖLGE TEMİZLİĞİ — sayfa kenarındaki ince koyu şerit için
      // İçeriğin sınır kutusunu sayfa kenarına dayanan piksellerden geri çek
      const edgePullCheck=(side)=>{
        // Bir kenardaki ilk koyu satır/sütun varsa, "gerçek içerik mi yoksa gölge mi" diye kontrol et
        // Eğer aynı satır/sütunda az koyu piksel varsa (oran<%30) → gölge, beyaza çevir
        const test=[];
        if(side==="top"){for(let x=0;x<w;x++)test.push((0*w+x)*4);}
        else if(side==="bottom"){for(let x=0;x<w;x++)test.push(((h-1)*w+x)*4);}
        else if(side==="left"){for(let y=0;y<h;y++)test.push((y*w+0)*4);}
        else if(side==="right"){for(let y=0;y<h;y++)test.push((y*w+(w-1))*4);}
        let darkCount=0;
        test.forEach(i=>{const gv=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;if(gv<150)darkCount++;});
        // Kenarın %15'inden fazlası koyuysa muhtemelen gölge çizgisi var, 1-3 piksellik şeridi temizle
        if(darkCount>test.length*0.15){
          const stripDepth=Math.max(2,Math.round(Math.min(w,h)*0.005));
          for(let s=0;s<stripDepth;s++){
            const idxs=[];
            if(side==="top"){for(let x=0;x<w;x++)idxs.push((s*w+x)*4);}
            else if(side==="bottom"){for(let x=0;x<w;x++)idxs.push(((h-1-s)*w+x)*4);}
            else if(side==="left"){for(let y=0;y<h;y++)idxs.push((y*w+s)*4);}
            else if(side==="right"){for(let y=0;y<h;y++)idxs.push((y*w+(w-1-s))*4);}
            idxs.forEach(i=>{
              const gv=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
              // Sadece gri/açık koyu (gerçek yazıya değil) → beyaza
              if(gv<200&&gv>50){d[i]=255;d[i+1]=255;d[i+2]=255;}
            });
          }
        }
      };
      edgePullCheck("top");
      edgePullCheck("bottom");
      edgePullCheck("left");
      edgePullCheck("right");
      ctx.putImageData(imgData,0,0);

      // 5) Otomatik kırpma — sadece soruyu içeren bölgeyi al
      if(maxX>minX+30&&maxY>minY+30){
        const margin=Math.round(Math.min(w,h)*0.025);
        const cx=Math.max(0,minX-margin);
        const cy=Math.max(0,minY-margin);
        const cw2=Math.min(w-cx,maxX-minX+2*margin);
        const ch2=Math.min(h-cy,maxY-minY+2*margin);
        const cropped=document.createElement("canvas");
        cropped.width=cw2;cropped.height=ch2;
        const cctx=cropped.getContext("2d");
        cctx.fillStyle="#fff";cctx.fillRect(0,0,cw2,ch2);
        cctx.drawImage(cv,cx,cy,cw2,ch2,0,0,cw2,ch2);
        resolve(cropped.toDataURL("image/png"));
      }else{
        resolve(cv.toDataURL("image/png"));
      }
    }catch(e){
      const r=new FileReader();
      r.onload=()=>resolve(r.result);
      r.readAsDataURL(file);
    }
  });
}

/* ═══ Floating Editor Toolbar — metin seçip boyut/stil değiştirme ═══ */
function EditorToolbar({pvRef,tpl}){
  const isLearning=tpl==="konu"; // Ders Notu / Konu Anlatımı
  const applySize=(size)=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount)return;
    const range=sel.getRangeAt(0);
    const span=document.createElement("span");
    span.style.fontSize=size;
    try{range.surroundContents(span);}catch(e){
      try{const frag=range.extractContents();span.appendChild(frag);range.insertNode(span);}catch(e2){}
    }
    sel.removeAllRanges();
  };
  const applyStyle=(prop,val)=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount)return;
    const range=sel.getRangeAt(0);
    const span=document.createElement("span");
    span.style[prop]=val;
    try{range.surroundContents(span);}catch(e){
      try{const frag=range.extractContents();span.appendChild(frag);range.insertNode(span);}catch(e2){}
    }
    sel.removeAllRanges();
  };
  const wrapBox=(className)=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount)return;
    const range=sel.getRangeAt(0);
    const div=document.createElement("div");
    div.className=className;
    try{range.surroundContents(div);}catch(e){
      try{const frag=range.extractContents();div.appendChild(frag);range.insertNode(div);}catch(e2){}
    }
    sel.removeAllRanges();
  };
  const insertBox=(className,placeholder)=>{
    const sel=window.getSelection();
    if(!sel||!sel.rangeCount)return;
    const range=sel.getRangeAt(0);
    const div=document.createElement("div");
    div.className=className;
    div.innerHTML=placeholder;
    div.contentEditable="true";
    range.collapse(false);
    range.insertNode(div);
    sel.removeAllRanges();
  };
  // Kutu/vurgu kaldır — seçili metnin etrafındaki kutuyu siler, içerik kalır
  const removeFormat=()=>{
    const sel=window.getSelection();
    if(!sel||!sel.rangeCount)return;
    const node=sel.anchorNode?.parentElement;
    if(!node)return;
    // En yakın ebox veya span bul
    const box=node.closest('.ebox')||node.closest('span[style]');
    if(box){
      const parent=box.parentNode;
      while(box.firstChild)parent.insertBefore(box.firstChild,box);
      parent.removeChild(box);
    }
  };
  const prevent=(e)=>e.preventDefault();
  return(
    <div className="etb" onMouseDown={prevent}>
      {/* SATIR 1: Temel araçlar — TÜM şablonlarda var */}
      <div className="etb-row">
        <button className="etb-b etb-ud" onMouseDown={prevent} onClick={()=>{document.execCommand('undo');}} title="Geri al">↩</button>
        <button className="etb-b etb-ud" onMouseDown={prevent} onClick={()=>{document.execCommand('redo');}} title="İleri al">↪</button>
        <button className="etb-b etb-ud" onMouseDown={prevent} onClick={removeFormat} title="Biçimlendirmeyi kaldır">✂️</button>
        <div className="etb-sep"/>
        <span className="etb-l">Yazı:</span>
        {[8,9,10,11,12,14].map(s=><button key={s} className={`etb-b${s===11?" etb-on":""}`} onMouseDown={prevent} onClick={()=>applySize(s+'pt')}>{s}</button>)}
        <div className="etb-sep"/>
        <button className="etb-b etb-f" onMouseDown={prevent} onClick={()=>applyStyle('fontWeight','bold')} title="Kalın"><b>B</b></button>
        <button className="etb-b etb-f" onMouseDown={prevent} onClick={()=>applyStyle('fontStyle','italic')} title="İtalik"><i>I</i></button>
        <button className="etb-b etb-f" onMouseDown={prevent} onClick={()=>applyStyle('textDecoration','underline')} title="Altı çizili"><u>U</u></button>
        <div className="etb-sep"/>
        <span className="etb-l">Renk:</span>
        <button className="etb-b etb-c" onMouseDown={prevent} onClick={()=>applyStyle('color','#c00')} title="Kırmızı">🔴</button>
        <button className="etb-b etb-c" onMouseDown={prevent} onClick={()=>applyStyle('color','#2563eb')} title="Mavi">🔵</button>
        <button className="etb-b etb-c" onMouseDown={prevent} onClick={()=>applyStyle('color','#1a1a1a')} title="Siyah">⚫</button>
      </div>
      {/* SATIR 2: Sadece Ders Notu / Kitap Sayfası için — vurgu + hazır kutular */}
      {isLearning&&<div className="etb-row etb-row2">
        <span className="etb-l">Vurgu:</span>
        <button className="etb-b etb-h" onMouseDown={prevent} onClick={()=>applyStyle('backgroundColor','#fef3c7')} title="Sarı" style={{background:'#fef3c7'}}>H</button>
        <button className="etb-b etb-h" onMouseDown={prevent} onClick={()=>applyStyle('backgroundColor','#dbeafe')} title="Mavi" style={{background:'#dbeafe'}}>H</button>
        <button className="etb-b etb-h" onMouseDown={prevent} onClick={()=>applyStyle('backgroundColor','#dcfce7')} title="Yeşil" style={{background:'#dcfce7'}}>H</button>
        <button className="etb-b etb-h" onMouseDown={prevent} onClick={()=>applyStyle('backgroundColor','#fde0e0')} title="Kırmızı" style={{background:'#fde0e0'}}>H</button>
        <div className="etb-sep"/>
        <span className="etb-l">Hazır kutu (önce metni seçin):</span>
        <button className="etb-b etb-bk etb-bk-def" onMouseDown={prevent} onClick={()=>wrapBox('bk-box bk-def')} title="Tanım kutusu">📘 Tanım</button>
        <button className="etb-b etb-bk etb-bk-thm" onMouseDown={prevent} onClick={()=>wrapBox('bk-box bk-thm')} title="Teorem kutusu">📐 Teorem</button>
        <button className="etb-b etb-bk etb-bk-prop" onMouseDown={prevent} onClick={()=>wrapBox('bk-box bk-prop')} title="Özellik kutusu">📗 Özellik</button>
        <button className="etb-b etb-bk etb-bk-warn" onMouseDown={prevent} onClick={()=>wrapBox('bk-box bk-warn')} title="Dikkat kutusu">⚠️ Dikkat</button>
        <button className="etb-b etb-bk etb-bk-tip" onMouseDown={prevent} onClick={()=>wrapBox('bk-box bk-tip')} title="İpucu kutusu">💡 İpucu</button>
        <button className="etb-b etb-bk etb-bk-ex" onMouseDown={prevent} onClick={()=>wrapBox('bk-example')} title="Örnek kutusu">✏️ Örnek</button>
        <button className="etb-b etb-bk etb-bk-sol" onMouseDown={prevent} onClick={()=>wrapBox('bk-solve')} title="Çözüm kutusu">✅ Çözüm</button>
      </div>}
    </div>
  );
}

function App(){

  const[spacings,setSpacings]=useState({});const[imgSizes,setImgSizes]=useState({});const[imgOffsets,setImgOffsets]=useState({});
  const[imgCrops,setImgCrops]=useState({}); // {idx: {top, right, bottom, left}} — yüzde
  const[answers,setAnswers]=useState({}); // {soru index: "A" veya "x=3"} — cevap anahtarı

  const updImgCrop=(idx,side,delta)=>setImgCrops(p=>{
    const cur=p[idx]||{top:0,right:0,bottom:0,left:0};
    const next={...cur,[side]:Math.max(0,Math.min(40,cur[side]+delta))};
    return{...p,[idx]:next};
  });
  const resetImgCrop=(idx)=>setImgCrops(p=>{const n={...p};delete n[idx];return n;});
  const[qImgs,setQImgs]=useState({}); // {idx: {src, size:100, offset:0}}
  const qImgFileRef=useRef();const qImgIdxRef=useRef(null);
  const addQImg=(i)=>{qImgIdxRef.current=i;qImgFileRef.current?.click();};
  const onQImgFile=(e)=>{
    const f=e.target.files?.[0];if(!f)return;
    const idx=qImgIdxRef.current;if(idx==null){e.target.value='';return;}
    const r=new FileReader();
    r.onload=()=>{setQImgs(p=>({...p,[idx]:{src:r.result,size:100,offset:0}}));};
    r.readAsDataURL(f);
    e.target.value='';
  };
  const updQImgSize=(i,v)=>setQImgs(p=>p[i]?({...p,[i]:{...p[i],size:Math.max(20,Math.min(200,v))}}):p);

        const raw1=await callAI([{type:"image",source:{type:"base64",media_type:m,data:b}},{type:"text",text:textPrompt}],"gemini-2.5-flash");
        // 1. geçiş artık DÜZ METİN — LaTeX backslash'ları JSON'u bozmuyor. AI yine JSON sararsa güvenli ayıkla.
        let html="";
        {
          let t1=(raw1||"").trim().replace(/^```(?:json|latex|text)?\s*/i,"").replace(/\s*```$/i,"").trim();
          if(t1.charAt(0)==="{"&&/text/i.test(t1.slice(0,40))){
            try{const j1=parseJ(t1);html=(j1.text||j1.html||(j1.questions&&j1.questions[0])||"").trim();}catch(_){html=t1;}
          }else{html=t1;}
          // KaTeX tek-backslash delimiter ister: \\( -> \(
          html=html.replace(/\\\\\(/g,"\\(").replace(/\\\\\)/g,"\\)").replace(/\\\\\[/g,"\\[").replace(/\\\\\]/g,"\\]");
          // Satir sonlarini <br> yap (dangerouslySetInnerHTML ile basiliyor)
          html=html.replace(/\r\n/g,"\n").replace(/\n{2,}/g,"<br><br>").replace(/\n/g,"<br>");
        }
        // Yazı gerçekten okundu mu? (şekil yer tutucusu/br hariç)
        const hadText=html.replace(/\[ŞEKİL\]/g,"").replace(/<br\s*\/?>/gi," ").trim().length>0;

        // === GEÇİŞ 2: SADECE ŞEKİL KONUMU (ayrı, güvenilir) ===
        let figures=[];
        try{
          const boxPrompt=`Bu görselde geometrik şekil, üçgen, çember, grafik, diyagram veya çizim VAR MI?
Varsa konumunu bounding box olarak ver. Format: [ymin, xmin, ymax, xmax], değerler 0-1000 arası (ymin=üst, xmin=sol, ymax=alt, xmax=sağ). Şekil etrafında biraz boşluk bırak.
JSON: {"figures":[{"box":[ymin,xmin,ymax,xmax]}]}
Şekil yoksa: {"figures":[]}
Backtick KULLANMA.`;
          const raw2=await callAI([{type:"image",source:{type:"base64",media_type:m,data:b}},{type:"text",text:boxPrompt}],"gemini-2.5-flash");
          const j2=parseJ(raw2);
          figures=j2.figures||[];
        }catch(_){figures=[];}

        let figureAdded=false;
        // Şekilleri orijinal görselden kırp
        if(figures&&figures.length){
          const img=await new Promise((ok,no)=>{const im=new Image();im.onload=()=>ok(im);im.onerror=no;im.src=du;});
          const W=img.naturalWidth,H=img.naturalHeight;
          for(const fig of figures){
            const box=fig.box||fig;if(!box||box.length<4)continue;
            let[ymin,xmin,ymax,xmax]=box;
            // Sıra hatası düzelt (bazen xmin>xmax gelebilir)
            if(xmin>xmax)[xmin,xmax]=[xmax,xmin];
            if(ymin>ymax)[ymin,ymax]=[ymax,ymin];
            const x=Math.max(0,Math.round(xmin/1000*W));
            const y=Math.max(0,Math.round(ymin/1000*H));
            const w=Math.min(W-x,Math.round((xmax-xmin)/1000*W));
            const h=Math.min(H-y,Math.round((ymax-ymin)/1000*H));
            if(w<10||h<10)continue;
            const cv=document.createElement("canvas");cv.width=w;cv.height=h;
            const cctx=cv.getContext("2d",{willReadFrequently:true});
            cctx.drawImage(img,x,y,w,h,0,0,w,h);
            // Beyazlatma — karanlık fotoğraf arka planını temiz beyaza çevir (adaptif eşik)
            try{
              const id=cctx.getImageData(0,0,w,h);const d=id.data;const N=w*h;
              const gray=new Float32Array(N);
              for(let p=0,q=0;p<d.length;p+=4,q++)gray[q]=d[p]*0.299+d[p+1]*0.587+d[p+2]*0.114;
              const intg=new Float64Array(N);
              for(let yy=0;yy<h;yy++){let rs=0;for(let xx=0;xx<w;xx++){rs+=gray[yy*w+xx];intg[yy*w+xx]=rs+(yy>0?intg[(yy-1)*w+xx]:0);}}
              const rad=Math.max(12,Math.round(Math.min(w,h)*0.06));const bias=14;
              for(let yy=0;yy<h;yy++){for(let xx=0;xx<w;xx++){
                const x1=xx-rad<0?0:xx-rad,y1=yy-rad<0?0:yy-rad,x2=xx+rad>=w?w-1:xx+rad,y2=yy+rad>=h?h-1:yy+rad;
                const area=(x2-x1+1)*(y2-y1+1);
                const A=(y1>0&&x1>0)?intg[(y1-1)*w+(x1-1)]:0,B=(y1>0)?intg[(y1-1)*w+x2]:0,C=(x1>0)?intg[y2*w+(x1-1)]:0,D2=intg[y2*w+x2];
                const localAvg=(D2-B-C+A)/area;const i2=(yy*w+xx)*4;const gv=gray[yy*w+xx];
                if(gv>localAvg-bias){d[i2]=255;d[i2+1]=255;d[i2+2]=255;}
                else{const k=Math.pow(gv/(localAvg+1),1.4);d[i2]=Math.round(d[i2]*k);d[i2+1]=Math.round(d[i2+1]*k);d[i2+2]=Math.round(d[i2+2]*k);}
                d[i2+3]=255;
              }}
              cctx.putImageData(id,0,0);
            }catch(_){/* beyazlatma başarısızsa ham kırpma kalır */}
            const figUrl=cv.toDataURL("image/png");
            const imgTag='<img src="'+figUrl+'" style="max-width:70%;height:auto;display:block;margin:10px auto"/>';
            if(html.includes("[ŞEKİL]"))html=html.replace("[ŞEKİL]",imgTag);
            else html+=imgTag;
            figureAdded=true;
          }
        }
        // Şekil bekleniyordu ([ŞEKİL] yer tutucusu) ama bulunamadı mı?
        const figureMissing=html.includes("[ŞEKİL]")&&!figureAdded;
        html=html.replace(/\[ŞEKİL\]/g,"");
        // YEDEK: Yazı okunamadıysa VEYA şekil bulunamadıysa → tüm soruyu temiz görüntü olarak ver.
        // Geometri sorusunda yazı tek başına yetersiz; bu sayede şekil+yazı eksiksiz ve birebir gelir.
        if(!hadText||figureMissing){
          let whole=du;try{whole=await cleanImage(file);}catch(_){}
          html='<img src="'+whole+'" style="max-width:100%;height:auto"/>';
        }
        if(html.trim()){
          saveHistory();setQs(p=>[...p,html]);setShow(true);
        }else{
          setErr("Soru tanınamadı. Daha net/büyük fotoğraf deneyin veya 'Resim Olarak Ekle' kullanın.");
        }
      }catch(ex){
        setErr("Akıllı çevirme hatası: "+(ex.message==="Failed to fetch"?"Bağlantı kurulamadı":ex.message));
      }
    }
    setHybridBusy(false);
  };
  const reconvert=async(i)=>{setConverting(i);try{const raw=await callAI([{type:"text",text:dpr(PROMPT_SCAN)+"\n\nBu soruyu düzelt ve yeniden çevir:\n"+qs[i]}]);const j=parseJ(raw);if(j.questions?.length){saveHistory();const n=[...qs];n[i]=j.questions[0];setQs(n);}}catch(e){}setConverting(null);};
  const convertImgToText=async(i)=>{const q=qs[i];if(!q||!q.includes('<img'))return;setConverting(i);try{const src=q.match(/src="([^"]+)"/)?.[1];if(src){const b=src.split(",")[1],m=src.match(/^data:(image\/\w+);/)?.[1]||"image/png";const raw=await callAI([{type:"image",source:{type:"base64",media_type:m,data:b}},{type:"text",text:dpr(PROMPT_SCAN)}]);const j=parseJ(raw);if(j.questions?.length){saveHistory();const n=[...qs];n[i]=j.questions[0];setQs(n);}}}catch(e){}setConverting(null);};
  const addTxt=()=>{const ls=txt.split("\n").map(l=>l.trim()).filter(Boolean);if(ls.length){saveHistory();setQs(p=>[...p,...ls]);setTxt("");setShow(true);}};

      const j=parseJ(raw);
      // Birden fazla yanıt formatını destekle
      let texts=[];
      if(j.results&&Array.isArray(j.results)&&j.results.length){
        texts=j.results.map(r=>typeof r==="string"?r:(r.text||r.html||r.content||""));
      }else if(j.questions&&Array.isArray(j.questions)&&j.questions.length){
        texts=j.questions;
      }else if(j.text){
        texts=[j.text];
      }else if(j.html){
        texts=[j.html];
      }else if(typeof raw==="string"&&raw.trim().length>0&&!raw.includes("{")){
        // AI ham metin verdi (JSON değil)
        texts=[raw.trim()];
      }
      texts=texts.filter(t=>t&&t.trim());
      if(texts.length){
        saveHistory();
        setQs(p=>[...p,...texts]);
        setShow(true);
        setDrawMode(false);
      }else{
        setErr("Tanınamadı. Çizimi daha büyük yapın veya temizleyip tekrar deneyin.");
      }
    }catch(e){
      setErr(e.message==="Failed to fetch"?"Bağlantı kurulamadı.":e.message);
    }
    setBusy(false);
  };

  // SINAV_PRESETS kaldırıldı — yaprak testten farkı olmadığı için sadeleştirildi

  const printHtml=(title)=>`<!DOCTYPE html><html><head><title>${title||"MathStudio"}</title><link href="${GF}" rel="stylesheet"><style>@page{size:A4;margin:0}*{box-sizing:border-box;margin:0;padding:0}body{margin:0}.pw-break{display:none}.pw-page{page-break-after:always}.pw-page:last-child{page-break-after:auto}.QTE,.QOA{background:none!important;box-shadow:none!important;border:none!important}.QOA:empty{display:none}.QSP,.QIS,.etb,.etb *,.QOA-tools,.q-tools,.pw-tools,.q-del,.q-edit,.q-imgbtn,[contenteditable]{outline:none!important;box-shadow:none!important}.QSP,.QIS,.etb,.QOA-tools,.q-tools,.pw-tools,.q-del,.q-edit,.q-imgbtn,.QXIC{display:none!important}.QTE,.QTE:hover,.QTE:focus,.QOA,.QOA:hover,.QOA:focus{background:transparent!important;box-shadow:none!important;outline:none!important}.QOA:empty,.QOA:empty::before{display:none!important;content:none!important}.HbkE,.HbaE,.HinfE,.HduE,.HdbE,.HzhE,.HsiE,.HhdE{box-shadow:none!important;outline:none!important}body,html,.A4{background:#fff!important}${CMU_FONT_FACE}${a4css(ff)}${mathCSS()}</style></head><body>${pvRef.current?.outerHTML||""}</body></html>`;
  const print=()=>{const w=window.open("","_blank");if(!w)return;w.document.write(printHtml(cfg.konu));w.document.close();setTimeout(()=>w.print(),500);};

  const[sharing,setSharing]=useState(false);

  // === KaTeX LaTeX RENDER (Aşama 2 — otomatik) ===
  const[katexRendered,setKatexRendered]=useState(false);
  const renderKatex=(silent,retries)=>{
    if(retries===undefined)retries=6;
    // KaTeX kütüphanesi henüz CDN'den gelmediyse bekle ve tekrar dene
    if(!window.renderMathInElement){
      if(retries>0){setTimeout(()=>renderKatex(silent,retries-1),700);return;}
      if(!silent)alert("KaTeX henüz yüklenmedi. Birkaç saniye bekleyip tekrar deneyin (ilk yüklemede CDN'den gelir).");
      return;
    }
    // Önizleme henüz DOM'a mount olmadıysa bekle
    if(!pvRef.current){
      if(retries>0){setTimeout(()=>renderKatex(silent,retries-1),300);return;}
      if(!silent)alert("Önce sayfaya soru ekleyin.");return;
    }
    try{
      window.renderMathInElement(pvRef.current,{
        delimiters:[
          {left:'$$',right:'$$',display:true},
          {left:'\\[',right:'\\]',display:true},
          {left:'\\(',right:'\\)',display:false},
          {left:'$',right:'$',display:false}
        ],
        throwOnError:false,
        ignoredTags:['script','noscript','style','textarea','pre','code'],
        ignoredClasses:['mf','mr','mi','ml','ms','mp','mmx','katex','katex-html'], // Eski HTML + render edilmişleri tekrar etme
        // Inline modda da subscript/superscript ALTTA görünsün (\lim, \max, \min, \sup, \inf vb.)
        // \mathop{...}\limits → operatörü yapar VE alt/üst sınırları zorunlu olarak alt/üste koyar (inline'da bile).
        macros:{
          '\\lim':'\\mathop{\\mathrm{lim}}\\limits',
          '\\liminf':'\\mathop{\\mathrm{lim\\,inf}}\\limits',
          '\\limsup':'\\mathop{\\mathrm{lim\\,sup}}\\limits',
          '\\max':'\\mathop{\\mathrm{max}}\\limits',
          '\\min':'\\mathop{\\mathrm{min}}\\limits',
          '\\sup':'\\mathop{\\mathrm{sup}}\\limits',
          '\\inf':'\\mathop{\\mathrm{inf}}\\limits',
          '\\argmax':'\\mathop{\\mathrm{arg\\,max}}\\limits',
          '\\argmin':'\\mathop{\\mathrm{arg\\,min}}\\limits'
        }
      });
      setKatexRendered(true);
    }catch(e){
      if(!silent)alert("Render hatası: "+e.message);
    }
  };
  // qs değişince veya önizleme açılınca otomatik render (debounced + yeniden denemeli)
  useEffect(()=>{

  },[qs,show]);

  const sharePages=async()=>{

  // Sec bileşeni modül seviyesine taşındı (input odak kaybını önlemek için)

          {uploadSub&&<>
            {uploadSub==="draw"&&<div>

              <Canvas

                <span style={{fontSize:9,padding:"1px 5px",background:it.difficulty==="Kolay"?"#e8f5e9":it.difficulty==="Zor"?"#ffebee":"#fff8e1",color:it.difficulty==="Kolay"?"#1b5e20":it.difficulty==="Zor"?"#b71c1c":"#f57c00",borderRadius:8}}>{it.difficulty}</span>
              </div>
              <div style={{fontSize:11,color:"#333",lineHeight:1.4,maxHeight:50,overflow:"hidden",marginBottom:4}} dangerouslySetInnerHTML={{__html:(it.html||"").substring(0,200)+(it.html&&it.html.length>200?"...":"")}}/>
              <div style={{display:"flex",gap:4}}>
                <button className="p-sb" style={{flex:1,fontSize:11}} onClick={()=>addBankItemToPage(it)}>➕ Sayfaya ekle</button>
                <button className="p-sb" style={{fontSize:11,background:"#ffebee",color:"#c62828",borderColor:"#ef9a9a"}} onClick={()=>removeFromBank(it.id)}>🗑️</button>
              </div>
            </div>)}
            {filteredBank.length>50&&<div style={{padding:8,fontSize:11,color:"#666",textAlign:"center"}}>İlk 50 sonuç gösteriliyor — daha fazla için filtreyi daraltın</div>}
          </div>
        </Sec>
        <Sec openSec={openSec} setOpenSec={setOpenSec} n={6} title="✅ Cevap Anahtarı" icon="✅">
          <div style={{padding:8,background:"#f0f9ff",borderRadius:6,marginBottom:8,fontSize:11,color:"#555",lineHeight:1.5}}>
            Her sorunun cevabını yazın (örn. <b>A</b> ya da <b>x=3</b>). Cevaplar yazdırma/PDF çıktısında otomatik <b>Cevap Anahtarı</b> olarak görünür.
            <br/>Not: Çıktıda görünmesi için <b>Döküman Bilgileri → Cevap Anahtarı</b> kutusu işaretli olmalı (yaprak test ve sınav şablonlarında).
          </div>
          {qs.length===0&&<div style={{padding:14,textAlign:"center",color:"#999",fontSize:12}}>Önce sayfaya soru ekleyin.</div>}
          {qs.length>0&&<>
            <div style={{maxHeight:340,overflowY:"auto",border:"1px solid #e0e0e0",borderRadius:6,background:"#fafafa"}}>
              {qs.map((q,i)=>{
                const preview=(q||"").replace(/<[^>]+>/g," ").replace(/&nbsp;/g," ").replace(/\s+/g," ").trim().slice(0,48);
                return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderBottom:"1px solid #eee",background:"#fff"}}>
                  <b style={{minWidth:24,textAlign:"right",color:"#1b2a4a",fontSize:12}}>{i+1}.</b>
                  <span style={{flex:1,fontSize:11,color:"#666",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{preview||"(görsel / şekil)"}</span>
                  <input value={answers[i]||""} onChange={e=>setAnswers(p=>({...p,[i]:e.target.value}))} placeholder="A / x=3" style={{width:74,padding:"4px 6px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:13,textAlign:"center",fontWeight:600}}/>
                </div>;
              })}
            </div>
            <button className="p-sb" style={{marginTop:8}} onClick={()=>{if(Object.keys(answers).length&&!confirm("Girilen tüm cevaplar silinsin mi?"))return;setAnswers({});}}>🗑️ Cevapları temizle</button>
          </>}
        </Sec>
        {bankAddIdx!=null&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setBankAddIdx(null);}}>
          <div style={{background:"#fff",borderRadius:12,padding:20,maxWidth:420,width:"90%",boxShadow:"0 10px 40px rgba(0,0,0,.3)"}}>
            <h3 style={{margin:"0 0 12px 0",color:"#1b2a4a"}}>Bu soruyu bankaya ekle</h3>
            <div style={{padding:10,background:"#f5f7fa",borderRadius:6,marginBottom:12,fontSize:12,maxHeight:120,overflow:"hidden"}} dangerouslySetInnerHTML={{__html:(qs[bankAddIdx]||"").substring(0,300)}}/>
            <div className="p-row"><span className="p-lbl">Ders</span>
              <select className="p-sel" value={bankMeta.subject} onChange={e=>setBankMeta(m=>({...m,subject:e.target.value}))}>
                {["Matematik","Fizik","Kimya","Biyoloji","Türkçe","Sosyal","Diğer"].map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div className="p-row"><span className="p-lbl">Sınıf</span>
              <select className="p-sel" value={bankMeta.grade} onChange={e=>setBankMeta(m=>({...m,grade:e.target.value}))}>
                {["5","6","7","8","9","10","11","12","Genel"].map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <div className="p-row"><span className="p-lbl">Konu</span>
              <input className="p-sel" placeholder="Limit, Türev..." value={bankMeta.topic} onChange={e=>setBankMeta(m=>({...m,topic:e.target.value}))} style={{flex:1}}/>
            </div>
            <div className="p-row"><span className="p-lbl">Zorluk</span>
              <div className="p-btns">
                {["Kolay","Orta","Zor"].map(d=><button key={d} className={`p-sb${bankMeta.difficulty===d?" p-on":""}`} onClick={()=>setBankMeta(m=>({...m,difficulty:d}))}>{d}</button>)}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button className="bo" style={{flex:1,background:"#1b2a4a",color:"#fff"}} onClick={confirmAddToBank}>Bankaya Ekle</button>
              <button className="bo" onClick={()=>setBankAddIdx(null)}>Vazgeç</button>
            </div>
          </div>
        </div>}
        {/* Eski Soru Ekle bölümü kaldırıldı — yeni vurgulu versiyon yukarıda n={1} */}
        {/* Çıkmış Sorular Arşivim bölümü kaldırıldı — Soru Bankası'na odaklandık. AI özellikleri ileride bankaya entegre edilecek. */}
        {qs.length>0&&<div className="p-qs">
          <div className="p-qh">📋 {qs.length} Soru <button className="p-qcl" onClick={()=>{saveHistory();setQs([]);setShow(false);setAnswers({});setQNums({});}}>Tümünü Sil</button>{history.length>0&&<button className="p-qu" onClick={undo}>↩</button>}</div>
          <div className="p-ql">{qs.map((q,i)=><QItem key={`q${i}`} index={i} html={q} onUpdate={(val)=>{const n=[...qs];n[i]=val;setQs(n);}} onDelete={()=>delQ(i)} onCopy={()=>copyQ(i)}
            onReconvert={typeof q==="string"&&q.includes("<img")?()=>convertImgToText(i):()=>reconvert(i)} reconverting={converting===i}
            onDragStart={setDragIdx} onDragOver={setOverIdx} onDrop={handleDrop} dragging={overIdx===i&&dragIdx!==i}/>)}</div>
        </div>}
      </div>
      <div className="preview">
        {qs.length===0?<div className="empty-msg"><div className="empty-icon">📄</div><div className="empty-title">Sayfa boş</div><div className="empty-desc">Sol panelden soru ekleyin</div></div>:
        <div className="pw" ref={pvRef} onClick={e=>{const box=e.target.closest(".ebox,.bk-box,.bk-example,.bk-solve");if(box){const rect=box.getBoundingClientRect();const x=e.clientX-rect.left,y=e.clientY-rect.top;if(x>rect.width-60&&y<22)box.parentNode.removeChild(box);}}}>
          <EditorToolbar pvRef={pvRef} tpl={tpl}/>
          {Array.from({length:Math.ceil(qs.length/perPage)}).map((_,pi)=>{
            const pageQs=qs.slice(pi*perPage,(pi+1)*perPage);
            const tp=Math.ceil(qs.length/perPage);
            return <div key={pi} className="pw-page">{pi>0&&<div className="pw-break"/>}<Page qs={pageQs} tpl={tpl} cols={cols} cfg={cfg} ff={ff} pageNum={pi+1} totalPages={tp} startNum={pi*perPage+1} qSize={qSize} spacings={spacings} imgSizes={imgSizes} imgOffsets={imgOffsets} imgCrops={imgCrops} qImgs={qImgs} onAddQImg={(idx)=>{const ri=pi*perPage+idx;addQImg(ri);}} onUpdQImgSize={(idx,v)=>{const ri=pi*perPage+idx;updQImgSize(ri,v);}} onUpdQImgOffset={(idx,v)=>{const ri=pi*perPage+idx;updQImgOffset(ri,v);}} onDelQImg={(idx)=>{const ri=pi*perPage+idx;delQImg(ri);}} onAddToBank={(idx)=>{const ri=pi*perPage+idx;addToBank(ri);}} answers={answers} qNums={qNums} onUpdQNum={(idx,v)=>{const ri=pi*perPage+idx;updQNum(ri,v);}} onUpdateImgSize={(idx,val)=>{const ri=pi*perPage+idx;setImgSizes(s=>({...s,[ri]:val}));}} onUpdateImgOffset={(idx,val)=>{const ri=pi*perPage+idx;setImgOffsets(s=>({...s,[ri]:val}));}} onUpdateImgCrop={(idx,side,delta)=>{const ri=pi*perPage+idx;updImgCrop(ri,side,delta);}} onResetImgCrop={(idx)=>{const ri=pi*perPage+idx;resetImgCrop(ri);}} onUpdateSpacing={(idx,val)=>{const ri=pi*perPage+idx;setSpacings(s=>({...s,[ri]:val}));}} onUpdateQ={(idx,html)=>{const ri=pi*perPage+idx;const n=[...qs];n[ri]=html;setQs(n);}}/></div>;
          })}
        </div>}
      </div>
    </main>
  </div>);
}
